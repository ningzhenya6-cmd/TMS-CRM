      <span>新签 <strong class="text-green-700">{{ statsThisMonth.newCount }}</strong> · 续费 <strong class="text-amber-700">{{ statsThisMonth.renewalCount }}</strong></span>
      <span>{{ statsThisMonth.hours }} 课时</span>
      <span class="ml-auto font-bold text-green-700">¥{{ statsThisMonth.amount.toLocaleString() }}</span>
    </div>

    <!-- 筛选栏 -->
    <div class="bg-white rounded-xl border border-gray-200 p-3 mb-4 flex items-center gap-3 flex-wrap">
      <input type="date" v-model="filterDateFrom" class="px-2 py-1.5 border border-gray-300 rounded text-xs outline-none">
      <span class="text-xs text-gray-400">至</span>
      <input type="date" v-model="filterDateTo" class="px-2 py-1.5 border border-gray-300 rounded text-xs outline-none">
      <input type="text" v-model="filterSearch" placeholder="搜索学生姓名..." class="px-2 py-1.5 border border-gray-300 rounded text-xs outline-none w-40">
      <button v-if="filterDateFrom || filterDateTo || filterSearch" class="text-xs text-gray-500 hover:text-red-500" @click="clearFilters">
        <i class="bi bi-x-circle"></i> 清除
      </button>
      <span class="ml-auto text-xs text-gray-400">显示 {{ filteredPayments.length }} 笔</span>
    </div>

    <!-- 收款记录表 -->
    <div v-if="loading" class="text-center py-10 text-gray-400">加载中...</div>
    <div v-else-if="allPayments.length === 0" class="bg-white rounded-xl border border-gray-200 p-10 text-center text-sm text-gray-400">暂无收款记录</div>
    <div v-else>
      <div class="bg-white rounded-xl border border-gray-200 overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="bg-gray-50 text-left">
              <th class="px-3 py-2.5 text-gray-600 font-medium text-xs whitespace-nowrap">收款日期</th>
              <th class="px-3 py-2.5 text-gray-600 font-medium text-xs whitespace-nowrap">学生</th>
              <th class="px-3 py-2.5 text-gray-600 font-medium text-xs whitespace-nowrap">类型</th>
              <th class="px-3 py-2.5 text-gray-600 font-medium text-xs whitespace-nowrap">报名课时</th>
              <th class="px-3 py-2.5 text-gray-600 font-medium text-xs whitespace-nowrap text-right">收款金额</th>
              <th class="px-3 py-2.5 text-gray-600 font-medium text-xs whitespace-nowrap">方式</th>
              <th class="px-3 py-2.5 w-20"></th>
            </tr>
          </thead>
          <tbody class="divide-y divide-gray-100">
            <tr v-for="p in filteredPayments" :key="p.payment_id" class="hover:bg-gray-50">
              <td class="px-3 py-2.5 text-xs text-gray-600">{{ (p.payment_date || '').slice(0,10) }}</td>
              <td class="px-3 py-2.5">
                <span class="font-medium text-gray-900 text-xs">{{ p.lead_name || '-' }}</span>
              </td>
              <td class="px-3 py-2.5">
                <select v-if="canManage" :value="p.sign_type" @change="toggleSignType(p, $event.target.value)" class="text-[.6rem] px-1 py-0.5 rounded border-0 outline-none cursor-pointer" :class="p.sign_type === 'renewal' ? 'bg-amber-100 text-amber-700' : 'bg-green-100 text-green-700'">
                  <option value="new">新签</option>
                  <option value="renewal">续费</option>
                </select>
                <span v-else :class="p.sign_type === 'renewal' ? 'inline-block px-1.5 py-0.5 rounded text-[.6rem] bg-amber-100 text-amber-700' : 'inline-block px-1.5 py-0.5 rounded text-[.6rem] bg-green-100 text-green-700'">{{ p.sign_type === 'renewal' ? '续费' : '新签' }}</span>
              </td>
              <td class="px-3 py-2.5 text-xs text-gray-700">
                <input v-if="canManage" type="number" :value="p.total_hours" @change="updatePayHrs(p, $event.target.value)" class="text-xs w-14 px-1 border border-gray-200 rounded text-center outline-none text-gray-700" step="0.5" min="0">
                <span v-else>{{ p.total_hours || 0 }}h</span>
              </td>
              <td class="px-3 py-2.5 text-right">
                <input v-if="canManage" type="number" :value="p.amount" @change="updatePayAmt(p, $event.target.value)" class="text-xs w-20 px-1 py-0.5 border border-gray-200 rounded outline-none text-right text-green-600 font-bold" min="0" step="0.01">
                <span v-else class="text-xs text-green-600 font-bold">¥{{ (p.amount || 0).toLocaleString() }}</span>
              </td>
              <td class="px-3 py-2.5 text-xs text-gray-400">{{ p.method || '-' }}</td>
              <td class="px-3 py-2.5">
                <button v-if="canManage" class="text-red-400 hover:text-red-600 text-xs" @click="confirmDeletePayment(p.contract_id, p.payment_id, p.amount)" title="删除"><i class="bi bi-trash"></i></button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
      <!-- 合计 -->
      <div class="mt-3 bg-indigo-50 rounded-xl border border-indigo-100 p-3 flex items-center gap-6 text-xs">
        <span class="text-gray-600">共 <strong class="text-indigo-700">{{ filteredPayments.length }}</strong> 笔</span>
        <span class="text-gray-600">新签 <strong>{{ filteredPayments.filter(p => p.sign_type === 'new').length }}</strong> · 续费 <strong>{{ filteredPayments.filter(p => p.sign_type === 'renewal').length }}</strong></span>
        <span class="ml-auto font-bold text-green-700">¥{{ filteredPayments.reduce((s,p) => s + (p.amount||0), 0).toLocaleString() }}</span>
      </div>
    </div>
  </div>

  <!-- ═══ Tab 2: 学生总览 ═══ -->
  <div v-if="tab === 'students'">
    <div class="flex items-center gap-2 mb-4">
      <input type="text" v-model="studentSearch" @input="debounceStudentSearch" placeholder="搜索学生姓名/手机..." class="px-3 py-1.5 border border-gray-300 rounded-lg text-sm outline-none w-56">
      <button class="px-2 py-1.5 text-xs border border-gray-300 rounded hover:bg-gray-100" @click="downloadStudentCSV">
        <i class="bi bi-download"></i> 导出CSV
      </button>
    </div>

    <div v-if="studentsLoading" class="text-center py-10 text-gray-400">加载中...</div>
    <div v-else-if="studentsList.length === 0" class="bg-white rounded-xl border border-gray-200 p-10 text-center text-sm text-gray-400">暂无签约学生</div>
    <div v-else class="space-y-3">
      <div v-for="s in studentsList" :key="s.id"
           class="bg-white rounded-xl border border-gray-200 p-5 cursor-pointer hover:shadow-md transition"
           @click="openLead(s.id)">
        <div class="flex items-start justify-between mb-3">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-indigo-100 text-indigo-700 flex items-center justify-center font-bold text-sm">{{ s.name[0] }}</div>
            <div>
              <h5 class="text-base font-semibold text-gray-900">{{ s.name }}</h5>
              <p class="text-xs text-gray-400">{{ s.phone || '-' }} · {{ s.source || '-' }}</p>
            </div>
          </div>
          <div class="text-right text-xs">
            <span class="text-gray-500">跟进人: {{ s.assignee_name || '未分配' }}</span>
            <br>
            <span class="text-gray-400">班主任: {{ s.coordinator_name || '未分配' }}</span>
          </div>
          <div class="flex items-center gap-1 ml-2" @click.stop>
            <button v-if="canAssignCoordinator" class="px-2 py-1 text-xs border border-gray-300 rounded hover:bg-indigo-50 hover:border-indigo-300" @click="openAssignCoordinator(s)">
              <i class="bi bi-person-plus text-xs"></i> 分配
            </button>
            <button v-if="canManage" class="px-2 py-1 text-xs bg-green-600 text-white rounded hover:bg-green-700" @click.stop="openAddPayment(s)" title="追加收款">
              <i class="bi bi-cash-coin"></i>
            </button>
          </div>
        </div>

        <!-- Key stats -->
        <div class="grid grid-cols-4 gap-3">
          <div class="bg-gray-50 rounded-lg p-3 text-center">
            <p class="text-xs text-gray-500 mb-0.5">已收金额</p>
            <p class="text-sm font-bold" :class="(s.contract?.paid_amount || 0) > 0 ? 'text-green-600' : 'text-gray-400'">
              ¥{{ (s.contract?.paid_amount || 0).toLocaleString() }}
            </p>
          </div>
          <div class="bg-gray-50 rounded-lg p-3 text-center">
            <p class="text-xs text-gray-500 mb-0.5">剩余课时</p>
            <p class="text-sm font-bold" :class="s.remaining_hours <= 5 ? 'text-red-600' : 'text-gray-800'">
              {{ s.remaining_hours || 0 }}<span class="text-xs font-normal text-gray-400">/{{ s.total_hours || 0 }}h</span>
            </p>
          </div>
          <div class="bg-gray-50 rounded-lg p-3 text-center">
            <p class="text-xs text-gray-500 mb-0.5">最近上课</p>
            <p class="text-sm font-bold text-gray-800">{{ s.last_class?.start_time?.slice(0,10) || '-' }}</p>
          </div>
          <div class="bg-gray-50 rounded-lg p-3 text-center">
            <p class="text-xs text-gray-500 mb-0.5">下次上课</p>
            <p class="text-sm font-bold text-gray-800">{{ s.next_class?.start_time?.slice(0,10) || '-' }}</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Pagination -->
    <div v-if="studentTotalPages > 1" class="flex items-center justify-center gap-1 mt-4">
      <button class="pagination-btn" @click="goStudentPage(studentPage-1)" :disabled="studentPage===1">&lt;</button>
      <button v-for="n in studentPageNumbers" :key="n"
              class="pagination-btn" :class="{ active: n === studentPage }"
              @click="goStudentPage(n)" :disabled="n==='...'">{{ n }}</button>
      <button class="pagination-btn" @click="goStudentPage(studentPage+1)" :disabled="studentPage===studentTotalPages">&gt;</button>
    </div>

    <!-- Low hours alert -->
    <div v-if="studentsList.filter(s => s.remaining_hours <= 5).length > 0" class="mt-4 p-4 bg-amber-50 border border-amber-200 rounded-xl flex items-center gap-3">
      <i class="bi bi-exclamation-triangle-fill text-amber-500 text-lg"></i>
      <span class="text-sm text-amber-800">
        <strong>{{ studentsList.filter(s => s.remaining_hours <= 5).length }}</strong> 名学生课时即将用完，请及时安排续费沟通
      </span>

              <label class="block text-xs text-gray-600 mb-1">名称</label>

            </div>
            <div>
              <label class="block text-xs text-gray-600 mb-1">总课时 <span class="text-red-500">*</span></label>

          </div>
          <div class="mt-2">
            <label class="block text-xs text-gray-600 mb-1">单价 (元/小时)</label>
            <input type="number" v-model.number="signingForm.price_per_hour" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm outline-none" placeholder="375" min="0">
          </div>
          <p v-if="signingForm.total_hours && signingForm.price_per_hour" class="text-xs text-indigo-600 mt-1">
            课时金额: <strong>¥{{ (signingForm.total_hours * signingForm.price_per_hour).toLocaleString() }}</strong>

              <label class="block text-xs text-gray-600 mb-1">收款金额 <span class="text-red-500">*</span></label>
              <input type="number" v-model="signingForm.payment_amount" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm outline-none" placeholder="0.00" min="0" step="0.01">

        <div>
          <label class="block text-xs text-gray-600 mb-1">备注</label>

<script type="text/x-template" id="tpl-searchable-select">
<div class="relative">
  <!-- 显示区 -->
  <div class="relative">
    <input ref="searchInput"
      v-model="searchText"
      :placeholder="selectedLabel || placeholder"
      class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm outline-none bg-white"
      :class="{ 'border-indigo-400 ring-1 ring-indigo-200': isOpen }"
      @focus="isOpen = true"
      @blur="close"
      @input="isOpen = true"
      @keydown.escape="isOpen = false"
      @keydown.enter.prevent="selectFirst"
      @keydown.down.prevent="highlightNext"
      @keydown.up.prevent="highlightPrev">
    <div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none">
      <i class="bi bi-search text-gray-400 text-xs"></i>
    </div>
    <!-- 清除按钮 -->
    <div v-if="modelValue && !searchText" class="absolute inset-y-0 right-7 flex items-center cursor-pointer z-10" @mousedown.prevent="clear">
      <i class="bi bi-x-circle-fill text-gray-300 hover:text-gray-500 text-xs"></i>
    </div>
  </div>
  <!-- 下拉菜单 -->
  <div v-if="isOpen" class="absolute z-50 mt-1 w-full bg-white border border-gray-200 rounded-lg shadow-lg max-h-60 overflow-y-auto">
    <div v-if="filteredItems.length === 0" class="px-3 py-4 text-sm text-gray-400 text-center">无匹配结果</div>
    <div v-for="(item, idx) in filteredItems" :key="item[valueKey]"
      class="px-3 py-2 cursor-pointer flex items-center gap-2"
      :class="idx === highlightIdx ? 'bg-indigo-50' : 'hover:bg-gray-50'"
      @mousedown.prevent="select(item)">
      <div class="flex-1 min-w-0">
        <div class="text-sm font-medium truncate" :class="modelValue === item[valueKey] ? 'text-indigo-700' : 'text-gray-800'">{{ item[labelKey] }}</div>
        <div v-if="subLabelKey && item[subLabelKey]" class="text-xs text-gray-400 truncate">{{ item[subLabelKey] }}</div>
      </div>
      <i v-if="modelValue === item[valueKey]" class="bi bi-check-lg text-indigo-500 text-sm shrink-0"></i>
    </div>
  </div>
</div>
</script>
<script type="text/x-template" id="tpl-finance">
<div>
  <div class="mb-4">
    <h3 class="text-xl font-bold text-gray-900">财务管理</h3>
    <p class="text-sm text-gray-500 mt-0.5">收入概览 · 合同统计 · 课时利用率</p>
  </div>

  <!-- Stats -->
  <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
    <div class="bg-white rounded-xl border border-gray-200 p-5">
      <p class="text-xs text-gray-500 mb-0.5">合同总数</p>
      <p class="text-2xl font-bold text-gray-900">{{ summary.total_contracts ?? 0 }}</p>
    </div>
    <div class="bg-white rounded-xl border border-gray-200 p-5">
      <p class="text-xs text-gray-500 mb-0.5">进行中合同</p>
      <p class="text-2xl font-bold text-gray-900">{{ summary.active_contracts ?? 0 }}</p>
    </div>
    <div class="bg-white rounded-xl border border-gray-200 p-5">
      <p class="text-xs text-gray-500 mb-0.5">合同总金额</p>
      <p class="text-2xl font-bold text-gray-900">¥{{ (summary.total_amount ?? 0).toLocaleString() }}</p>
    </div>
    <div class="bg-white rounded-xl border border-gray-200 p-5">
      <p class="text-xs text-gray-500 mb-0.5">实收金额</p>
      <p class="text-2xl font-bold text-green-600">¥{{ (summary.total_paid ?? 0).toLocaleString() }}</p>
    </div>
    <div class="bg-white rounded-xl border border-gray-200 p-5">
      <p class="text-xs text-gray-500 mb-0.5">未收金额</p>
      <p class="text-2xl font-bold text-amber-600">¥{{ (summary.total_unpaid ?? 0).toLocaleString() }}</p>
    </div>
    <div class="bg-white rounded-xl border border-gray-200 p-5">
      <p class="text-xs text-gray-500 mb-0.5">累计退款</p>
      <p class="text-2xl font-bold text-red-500">¥{{ (summary.total_refund ?? 0).toLocaleString() }}</p>
    </div>
    <div class="bg-white rounded-xl border border-gray-200 p-5">
      <p class="text-xs text-gray-500 mb-0.5">课时利用率</p>
      <p class="text-2xl font-bold text-gray-900">{{ utilization }}%</p>
    </div>
  </div>

  <!-- Contracts list -->
  <div class="bg-white rounded-xl border border-gray-200">
    <div class="px-5 py-3 border-b border-gray-100 flex items-center justify-between">
      <h6 class="text-sm font-semibold text-gray-800">合同列表</h6>
    </div>
    <div v-if="contracts.length === 0" class="p-8 text-center text-sm text-gray-400">暂无合同数据</div>
    <div v-else class="divide-y divide-gray-100">
      <div v-for="c in contracts" :key="c.id" class="px-5 py-3 flex items-center justify-between hover:bg-gray-50">
        <div>
          <span class="text-sm font-medium">{{ c.lead_name || '-' }}</span>
          <span class="text-xs text-gray-400 ml-2">{{ c.contract_no || '' }}</span>
        </div>
        <div class="text-right">
          <div class="text-sm font-semibold">¥{{ (c.total_amount || 0).toLocaleString() }}</div>
          <div class="text-xs" :class="(c.paid_amount || 0) >= c.total_amount ? 'text-green-600' : 'text-amber-600'">
            已收 ¥{{ (c.paid_amount || 0).toLocaleString() }}
          </div>
          <span class="inline-block ml-2 px-2 py-0.5 rounded text-[.65rem] font-medium"
            :class="c.status === 'active' ? 'bg-green-100 text-green-800' : c.status === 'completed' ? 'bg-blue-100 text-blue-800' : 'bg-gray-100 text-gray-600'">
            {{ c.status === 'active' ? '进行中' : c.status === 'completed' ? '已结清' : '已结束' }}
          </span>
        </div>
      </div>
    </div>
  </div>
</div>
</script>

<!-- Batch Feedback -->
<script type="text/x-template" id="tpl-batch-feedback">
<div>
  <div class="flex items-center justify-between mb-4">
    <div>
      <h3 class="text-xl font-bold text-gray-900">批量反馈</h3>
      <p class="text-sm text-gray-500 mt-0.5">粘贴多个 ClassIn 链接，一键生成全部课后反馈</p>
    </div>
  </div>

  <!-- 第1步：选择学生 -->
  <div class="bg-white rounded-xl border border-gray-200 p-5 mb-4">
    <h5 class="font-semibold text-gray-800 mb-3">第1步：选择学生</h5>
    <div class="flex items-center gap-3">
      <div class="flex-1 max-w-md">
        <searchable-select
          :items="allLeadsForSearch"
          label-key="name"
          sub-label-key="phone"
          placeholder="搜索已有学生..."
          v-model="leadId">
        </searchable-select>
      </div>
      <span class="text-xs text-gray-400">或</span>
      <button class="px-3 py-2 text-sm border border-gray-300 rounded-lg hover:bg-gray-50" @click="showQuickAdd = true">
        <i class="bi bi-plus-lg"></i> 快速添加
      </button>
    </div>
    <div v-if="selectedLead" class="mt-3 flex items-center gap-3">
      <span class="px-3 py-2 bg-indigo-50 rounded-lg text-sm text-indigo-700 inline-flex items-center gap-2">
        <i class="bi bi-person-check"></i> {{ selectedLead.name }} {{ selectedLead.phone ? '· ' + selectedLead.phone : '' }}
      </span>
      <a href="#" class="text-xs text-indigo-600 underline hover:text-indigo-800" @click.prevent="openLeadDetail(selectedLead.id)">
        <i class="bi bi-arrow-right"></i> 进入学生详情
      </a>
    </div>
  </div>

  <!-- 第2步：粘贴链接 -->
  <div class="bg-white rounded-xl border border-gray-200 p-5 mb-4">
    <h5 class="font-semibold text-gray-800 mb-3">第2步：粘贴 ClassIn 链接</h5>
    <textarea v-model="linksText" :disabled="genRunning" rows="6"
      class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm outline-none font-mono"
      placeholder="每行粘贴一个 ClassIn 回放链接...&#10;https://live.eeo.cn/pc.html?lessonKey=xxx&#10;https://live.eeo.cn/webcast.php?courseKey=xxx&lessonid=yyy"></textarea>
    <p class="text-xs text-gray-400 mt-1">已识别 <strong>{{ parsedLinks.length }}</strong> 个链接</p>
  </div>

  <!-- 第3步：一键生成 -->
  <div class="mb-4">
    <button :disabled="!leadId || parsedLinks.length === 0 || genRunning"
      class="px-5 py-2.5 text-sm rounded-lg text-white font-medium disabled:opacity-40 transition"
      :class="genRunning ? 'bg-gray-400' : 'bg-indigo-600 hover:bg-indigo-700'"
      @click="startBatch">
      <i class="bi bi-lightning-charge"></i>
      {{ genRunning ? '生成中...' : '一键生成 ' + parsedLinks.length + ' 节课后反馈' }}
    </button>
  </div>

  <!-- 进度面板 -->
  <div v-if="batchStarted" class="bg-white rounded-xl border border-gray-200 p-5">
    <h5 class="font-semibold text-gray-800 mb-3">
      {{ genRunning ? '生成中 — ' + batchProgress.current_step : (batchStatus === 'done' ? '✅ 生成完成' : '') }}
      <span class="text-xs font-normal text-gray-400 ml-2" v-if="batchStatus === 'done'">
        成功 {{ batchResults.filter(r => r.status === 'done').length }} / {{ batchResults.length }}
      </span>
    </h5>
    <div class="space-y-2 max-h-96 overflow-y-auto">
      <div v-for="(r, i) in batchResults" :key="i"
        class="flex items-center gap-3 p-3 rounded-lg border text-sm"
        :class="r.status === 'done' ? 'border-green-200 bg-green-50' : r.status === 'error' ? 'border-red-200 bg-red-50' : 'border-gray-200 bg-white'">
        <span class="text-xs text-gray-400 w-6 text-center">{{ i+1 }}</span>
        <span class="flex-1 text-xs text-gray-600 truncate">{{ (r.link || '').slice(0,60) }}</span>
        <span v-if="r.status === 'done'" class="text-xs text-green-600 font-medium flex items-center gap-1">
          <i class="bi bi-check-circle-fill"></i>
          <a href="#" class="underline hover:text-green-800" @click.prevent="viewFeedback(r.schedule_id)">查看反馈</a>
        </span>
        <span v-else-if="r.status === 'error'" class="text-xs text-red-500" :title="r.error">
          <i class="bi bi-exclamation-circle"></i> 失败
        </span>
        <span v-else class="text-xs text-gray-400 flex items-center gap-1">
          <span class="inline-block w-2 h-2 bg-indigo-400 rounded-full animate-pulse"></span> 等待...
        </span>
      </div>
    </div>
    <div v-if="batchStatus === 'done' && selectedLead" class="mt-3 text-center">
      <a href="#" class="text-sm text-indigo-600 underline hover:text-indigo-800" @click.prevent="openLeadDetail(selectedLead.id)">
        <i class="bi bi-file-text"></i> 进入学生详情 → 生成整体学情报告
      </a>
    </div>
  </div>

  <!-- 查看反馈弹窗 -->
  <div v-if="showViewFeedback" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50 px-4" @click.self="closeViewFeedback">
    <div class="bg-white rounded-xl w-full max-w-2xl max-h-[85vh] overflow-y-auto p-6 shadow-xl">
      <h5 class="font-semibold text-gray-900 mb-1">课后反馈</h5>
      <p class="text-xs text-gray-400 mb-4">{{ viewFeedbackData.studentName || '' }} · {{ viewFeedbackData.classin_link || '' }}</p>
      <div class="space-y-3 text-sm">
        <div><label class="block text-xs text-gray-500 mb-0.5">教学内容</label><textarea v-model="viewFeedbackData.content_covered" rows="3" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm outline-none"></textarea></div>
        <div><label class="block text-xs text-gray-500 mb-0.5">学生表现</label><textarea v-model="viewFeedbackData.student_performance" rows="3" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm outline-none"></textarea></div>
        <div><label class="block text-xs text-gray-500 mb-0.5">薄弱环节</label><textarea v-model="viewFeedbackData.difficulties" rows="2" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm outline-none"></textarea></div>
        <div><label class="block text-xs text-gray-500 mb-0.5">作业完成</label><input v-model="viewFeedbackData.homework_completion" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm outline-none"></div>
        <div><label class="block text-xs text-gray-500 mb-0.5">教师备注（内部）</label><textarea v-model="viewFeedbackData.teacher_notes" rows="2" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm outline-none"></textarea></div>
        <div><label class="block text-xs text-gray-500 mb-0.5">后续建议（内部）</label><textarea v-model="viewFeedbackData.next_focus" rows="2" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm outline-none"></textarea></div>
      </div>
      <div class="flex justify-end gap-2 mt-5">
        <button class="px-3 py-2 text-xs border border-gray-300 rounded-lg hover:bg-gray-100" @click="copyBatchFeedback(true)"><i class="bi bi-clipboard"></i> 复制完整版</button>
        <button class="px-3 py-2 text-xs border border-gray-300 rounded-lg hover:bg-gray-100" @click="copyBatchFeedback(false)"><i class="bi bi-clipboard-check"></i> 复制家长版</button>
        <button class="px-4 py-2 text-sm bg-indigo-600 text-white rounded-lg hover:bg-indigo-700" @click="saveViewFeedback">保存</button>
        <button class="px-4 py-2 text-sm border border-gray-300 rounded-lg hover:bg-gray-50" @click="closeViewFeedback">关闭</button>
      </div>
    </div>
  </div>

  <!-- 快速添加学生弹窗 -->
  <div v-if="showQuickAdd" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50 px-4" @click.self="showQuickAdd = false">
    <div class="bg-white rounded-xl w-full max-w-sm p-6 shadow-xl">
      <h5 class="font-semibold text-gray-900 mb-4">快速添加学生</h5>
      <div class="space-y-3">
        <div><label class="block text-xs text-gray-600 mb-1">姓名 <span class="text-red-500">*</span></label><input v-model="quickForm.name" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm outline-none" placeholder="学生姓名"></div>
        <div><label class="block text-xs text-gray-600 mb-1">手机</label><input v-model="quickForm.phone" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm outline-none" placeholder="选填"></div>
        <div><label class="block text-xs text-gray-600 mb-1">来源</label><input v-model="quickForm.source" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm outline-none" placeholder="如: 转介绍"></div>
        <div><label class="block text-xs text-gray-600 mb-1">录入时间</label><input type="date" v-model="quickForm.created_at" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm outline-none"></div>
      </div>
      <div class="flex justify-end gap-2 mt-5">
        <button class="px-4 py-2 text-sm border border-gray-300 rounded-lg hover:bg-gray-50" @click="showQuickAdd = false">取消</button>
        <button class="px-4 py-2 text-sm bg-indigo-600 text-white rounded-lg hover:bg-indigo-700" @click="submitQuickAdd" :disabled="quickSaving">{{ quickSaving ? '添加中...' : '添加' }}</button>
      </div>
    </div>
  </div>
</div>
</script>

<script src="js/api.js"></script>
<script src="js/store.js"></script>
<script src="js/app.js?v=101"></script>

  </body>
</html>
