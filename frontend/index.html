<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<!-- X5 内核兼容 -->
<meta name="x5-orientation" content="portrait">
<meta name="x5-fullscreen" content="false">
<meta name="x5-page-mode" content="app">
<title>TMS — 辅导管理系统</title>
<script>
// 钉钉/微信 X5 内核检测 — 提示用系统浏览器打开
(function(){
  var ua = navigator.userAgent.toLowerCase();
  var isDingTalk = ua.indexOf('dingtalk') > -1;
  var isWeChat = ua.indexOf('micromessenger') > -1;
  var isQQ = ua.indexOf('qq/') > -1 || ua.indexOf('mqqbrowser') > -1;
  var isX5 = ua.indexOf('x5') > -1 || ua.indexOf('qqbrowser') > -1;
  if (isDingTalk || isWeChat || isQQ || isX5) {
    var div = document.createElement('div');
    div.id = 'browser-tip';
    div.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;padding:12px 16px;background:#fff3cd;border-bottom:2px solid #ffc107;font-size:13px;color:#856404;text-align:center;font-family:sans-serif;';
    div.innerHTML = '<b>📱 建议使用系统浏览器打开</b>&nbsp; 右上角点···选择"浏览器打开"，体验更完整';
    document.documentElement.style.paddingTop = '48px';
    // 尝试自动跳转系统浏览器（仅钉钉）
    if (isDingTalk) {
      div.innerHTML += '&nbsp; <a href="/go.html" style="color:#056de8;text-decoration:underline;font-weight:bold;">[去浏览器]</a>';
      // 钉钉 scheme 跳转
      setTimeout(function(){
        var link = document.createElement('a');
        link.href = 'https://tms.global1v1.com/';
        link.style.display = 'none';
        document.body.appendChild(link);
      }, 500);
    }
    setTimeout(function(){ if (document.getElementById('browser-tip')) document.getElementById('browser-tip').style.display = 'none'; }, 8000);
    var s = document.createElement('style');
    s.textContent = 'body{filter:none!important;-webkit-filter:none!important;-webkit-transform:translateZ(0)!important;transform:translateZ(0)!important;mix-blend-mode:normal!important;background-color:#f3f4f6!important}';
    document.head.appendChild(s);
  }
})();
</script>
<!-- Tailwind CSS — 先加载静态编译版（X5降级用），再加载JIT引擎（桌面端覆盖） -->
<link rel="stylesheet" href="/lib/tailwind-x5.css">
<script src="/lib/tailwind.min.js"></script>
<!-- Bootstrap Icons -->
<link rel="stylesheet" href="/lib/bootstrap-icons.min.css">
<!-- Vue 3 -->
<script src="/lib/vue.global.prod.js"></script>
<style>
/* ── 自定义样式 ── */
* { box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", Roboto, sans-serif; }
.sidebar { width: 220px; min-width: 220px; }
.main-content { min-height: 100vh; max-height: 100vh; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.nav-item { cursor: pointer; transition: all .12s; }
.nav-item:hover { background: rgba(255,255,255,.1); }
.nav-item.active { background: rgba(255,255,255,.15); border-left: 3px solid #818cf8; }
.status-badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: .72rem; font-weight: 500; }
.pagination-btn { min-width: 32px; height: 32px; display: inline-flex; align-items: center; justify-content: center; border-radius: 6px; font-size: .82rem; cursor: pointer; transition: all .12s; }
.pagination-btn:hover { background: #eef2ff; }
.pagination-btn.active { background: #4f46e5; color: white; }
.fade-enter-active, .fade-leave-active { transition: opacity .15s; }
.fade-enter-from, .fade-leave-to { opacity: 0; }
/* Toast */
.toast-container { position: fixed; top: 16px; right: 16px; z-index: 99999; }
.toast-msg { padding: 10px 18px; border-radius: 10px; box-shadow: 0 4px 16px rgba(0,0,0,.1); font-size: .85rem; display: flex; align-items: center; gap: 8px; animation: slideIn .25s ease; }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
/* Utility */
.text-muted { color: #9ca3af; }

/* ── 可爱 AI 小书僮 ── */
.character-box {
  width: 52px; height: 52px;
  background: linear-gradient(135deg, #818cf8, #6366f1);
  border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  position: relative;
  box-shadow: 0 4px 14px rgba(99,102,241,.35);
  flex-shrink: 0;
  animation: charFloat 2s ease-in-out infinite;
  transition: transform .3s;
}
.character-box.celebrate {
  animation: charCelebrate .5s ease-in-out infinite;
  background: linear-gradient(135deg, #34d399, #10b981);
  box-shadow: 0 4px 14px rgba(16,185,129,.35);
}
.char-face { font-size: 24px; line-height: 1; user-select: none; }
.char-shadow {
  position: absolute; bottom: -4px; left: 50%; transform: translateX(-50%);
  width: 30px; height: 6px; background: rgba(99,102,241,.2);
  border-radius: 50%;
  animation: shadowPulse 2s ease-in-out infinite;
}
.character-box.celebrate .char-shadow {
  background: rgba(16,185,129,.2);
}

@keyframes charFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}
@keyframes charCelebrate {
  0%, 100% { transform: translateY(0) rotate(0); }
  25% { transform: translateY(-8px) rotate(-5deg); }
  75% { transform: translateY(-8px) rotate(5deg); }
}
@keyframes shadowPulse {
  0%, 100% { width: 30px; opacity: .3; }
  50% { width: 20px; opacity: .15; }
}

/* 进度条 */
.progress-track {
  width: 100%; height: 10px;
  background: #e5e7eb;
  border-radius: 10px;
  overflow: hidden;
  position: relative;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #818cf8, #6366f1);
  border-radius: 10px;
  transition: width .6s cubic-bezier(.34,1.56,.64,1);
  position: relative;
  overflow: hidden;
}
.progress-fill::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.35), transparent);
  animation: progressShine 1.8s ease-in-out infinite;
}
@keyframes progressShine {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}

/* 完成撒花 */
.confetti-container {
  position: relative; height: 0; overflow: visible;
  margin-top: -8px;
}
.confetti-piece {
  position: absolute; top: 0;
  font-size: 14px;
  animation: confettiFall 1.2s ease-out forwards;
  opacity: 0;
}
@keyframes confettiFall {
  0% { opacity: 1; transform: translateY(0) scale(0); }
  50% { opacity: 1; transform: translateY(-16px) scale(1.2); }
  100% { opacity: 0; transform: translateY(8px) scale(.8); }
}
</style>
</head>
<body class="bg-gray-50">

<div id="app">
  <!-- ═══ 登录页 ═══ -->
  <div v-if="!user" class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-950 to-indigo-800 px-4">
    <div class="w-full max-w-md bg-white rounded-2xl p-8 shadow-2xl">
      <div class="text-center mb-6">
        <h2 class="text-xl font-bold text-gray-900">TMS 辅导管理系统</h2>
        <p class="text-sm text-gray-500 mt-1">留学生课业辅导 — Tutoring Management</p>
      </div>
      <form @submit.prevent="handleLogin">
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
          <input type="text" v-model="loginForm.username" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none text-sm" placeholder="请输入用户名" required autofocus>
        </div>
        <div class="mb-5">
          <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
          <input type="password" v-model="loginForm.password" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none text-sm" placeholder="请输入密码" required>
        </div>
        <div v-if="loginError" class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700">{{ loginError }}</div>
        <button type="submit" class="w-full py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-lg text-sm transition" :disabled="loading">
          {{ loading ? '登录中...' : '登 录' }}
        </button>
      </form>
    </div>
  </div>

  <!-- ═══ 主应用（已登录） ═══ -->
  <div v-else class="flex h-screen overflow-hidden">
    <!-- 移动端遮罩 -->
    <div v-if="sidebarOpen" class="fixed inset-0 bg-black/50 z-20 lg:hidden" @click="sidebarOpen=false"></div>

    <!-- 侧边栏（移动端覆盖式 / 桌面端固定） -->
    <aside class="fixed lg:static inset-y-0 left-0 z-30 bg-indigo-950 text-white flex flex-col transition-transform duration-200"
           :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'"
           style="width:220px; min-width:220px;">
      <div class="px-5 py-4 border-b border-white/10 flex items-center justify-between">
        <div>
          <h5 class="font-bold text-sm">TMS 学管系统</h5>
          <p class="text-[.65rem] text-indigo-300">Tutoring Management</p>
        </div>
        <i class="bi bi-x-lg text-white/60 cursor-pointer lg:hidden" @click="sidebarOpen=false"></i>
      </div>
      <nav class="flex-1 py-2 overflow-y-auto text-sm">
        <div v-for="item in menuItems" :key="item.id">
          <div v-if="item.divider" class="h-px bg-white/10 my-2 mx-4"></div>
          <div v-else
               class="nav-item flex items-center gap-3 px-5 py-2.5"
               :class="{ active: currentView === item.view }"
               @click="switchView(item.view); sidebarOpen=false"
               v-show="hasRole(item.roles)">
            <i :class="item.icon" class="text-base w-5 text-center"></i>
            <span class="flex-1">{{ item.label }}</span>
            <span v-if="item.view === 'followup-plan' && overdueBadge > 0" class="ml-auto inline-flex items-center justify-center min-w-[20px] h-5 px-1.5 text-[.6rem] font-bold text-white bg-red-500 rounded-full">{{ overdueBadge > 99 ? '99+' : overdueBadge }}</span>
          </div>
        </div>
      </nav>
      <div class="px-5 py-3 border-t border-white/10 flex items-center gap-2 text-xs">
        <i class="bi bi-person-circle text-lg"></i>
        <div class="flex-1 min-w-0">
          <div class="truncate font-medium">{{ user.display_name }}</div>
          <span class="text-indigo-300">{{ roleLabel(user.role) }}</span>
        </div>
        <i class="bi bi-box-arrow-right opacity-50 cursor-pointer hover:opacity-100" @click="handleLogout" title="退出"></i>
      </div>
    </aside>

    <!-- 主内容 -->
    <main class="main-content flex-1 w-full lg:w-auto">
      <!-- 移动端顶栏 -->
      <div class="sticky top-0 z-10 bg-gray-50 lg:hidden flex items-center gap-3 px-4 py-3 border-b border-gray-200">
        <i class="bi bi-list text-2xl cursor-pointer text-gray-700" @click="sidebarOpen=true"></i>
        <span class="font-bold text-sm text-gray-900 truncate">{{ currentViewTitle }}</span>
      </div>
      <div class="p-3 lg:p-6">
        <include-dashboard v-if="currentView === 'dashboard'"
            :user="user" :switch-view="switchView" :role-label="roleLabel" :status-badge="statusBadge">
        </include-dashboard>
        <include-leads v-if="currentView === 'leads'"
            :user="user" :switch-view="switchView" :role-label="roleLabel" :status-badge="statusBadge">
        </include-leads>
        <include-lead-detail v-if="currentView === 'lead-detail'"
            :user="user" :switch-view="switchView" :role-label="roleLabel" :status-badge="statusBadge">
        </include-lead-detail>
        <include-quick-add v-if="currentView === 'quick-add'"
            :user="user" :switch-view="switchView" :role-label="roleLabel" :status-badge="statusBadge">
        </include-quick-add>
        <include-followup-plan v-if="currentView === 'followup-plan'"
            :user="user" :switch-view="switchView" :role-label="roleLabel" :status-badge="statusBadge">
        </include-followup-plan>
        <include-schedules v-if="currentView === 'schedules'"
            :user="user" :switch-view="switchView" :role-label="roleLabel" :status-badge="statusBadge">
        </include-schedules>
        <include-trials v-if="currentView === 'trials'"
            :user="user" :switch-view="switchView" :role-label="roleLabel" :status-badge="statusBadge">
        </include-trials>
        <include-teachers v-if="currentView === 'teachers'"
            :user="user" :switch-view="switchView" :role-label="roleLabel" :status-badge="statusBadge">
        </include-teachers>
        <include-pool v-if="currentView === 'pool'"
            :user="user" :switch-view="switchView" :role-label="roleLabel" :status-badge="statusBadge">
        </include-pool>
        <include-coordinator v-if="currentView === 'coordinator'"
            :user="user" :switch-view="switchView" :role-label="roleLabel" :status-badge="statusBadge">
        </include-coordinator>
        <include-assignment v-if="currentView === 'assignment'"
            :user="user" :switch-view="switchView" :role-label="roleLabel" :status-badge="statusBadge">
        </include-assignment>
        <include-signing v-if="currentView === 'signing'"
            :user="user" :switch-view="switchView" :role-label="roleLabel" :status-badge="statusBadge">
        </include-signing>
        <include-finance v-if="currentView === 'finance'"
            :user="user" :switch-view="switchView" :role-label="roleLabel" :status-badge="statusBadge">
        </include-finance>
        <include-growth v-if="currentView === 'growth'"
            :user="user" :switch-view="switchView" :role-label="roleLabel" :status-badge="statusBadge">
        </include-growth>
        <include-consulting v-if="currentView === 'consulting'"
            :user="user" :switch-view="switchView" :role-label="roleLabel" :status-badge="statusBadge">
        </include-consulting>
        <include-batch-feedback v-if="currentView === 'batch-feedback'"
            :user="user" :switch-view="switchView" :role-label="roleLabel" :status-badge="statusBadge">
        </include-batch-feedback>
      </div>
    </main>
  </div>

  <!-- Toast 容器 -->
  <div class="toast-container" id="toast-container"></div>
  <div v-if="loading" class="fixed inset-0 bg-black/20 flex items-center justify-center z-50">
    <div class="bg-white rounded-xl p-4 shadow-xl flex items-center gap-3">
      <div class="w-5 h-5 border-2 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
      <span class="text-sm text-gray-600">加载中...</span>
    </div>
  </div>
</div>

<!-- ═══ Component Templates ═══ -->

<!-- 成长档案 -->
<script type="text/x-template" id="tpl-growth">
<div>
  <!-- 头部 -->
  <div class="flex items-center justify-between mb-6">
    <h3 class="text-xl font-bold text-gray-900">成长档案</h3>
  </div>

  <!-- 学生选择 -->
  <div class="mb-6 relative">
    <div class="relative">
      <i class="bi bi-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
      <input type="text" class="w-full max-w-md pl-9 pr-4 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" placeholder="搜索学生姓名或手机号..." v-model="searchQuery">
    </div>
    <div v-if="searchQuery && filteredStudents.length > 0" class="absolute z-10 mt-1 w-full max-w-md bg-white border border-gray-200 rounded-lg shadow-lg max-h-60 overflow-y-auto">
      <div v-for="s in filteredStudents" :key="s.id" class="px-4 py-2.5 hover:bg-indigo-50 cursor-pointer flex items-center gap-3" :class="{'bg-indigo-50': selectedLeadId === s.id}" @click="selectStudent(s.id); searchQuery=''">
        <i class="bi bi-person-circle text-gray-400"></i>
        <div>
          <div class="text-sm font-medium text-gray-900">{{ s.name }}</div>
          <div class="text-xs text-gray-500">{{ s.phone || '' }} · {{ s.grade || '' }}</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 加载中 -->
  <div v-if="loading" class="flex items-center justify-center py-20">
    <div class="w-6 h-6 border-2 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
    <span class="ml-3 text-sm text-gray-500">加载中...</span>
  </div>

  <!-- ═══ 成长档案内容 ═══ -->
  <div v-if="growth && !loading">

    <!-- ── 学生全景卡片 ── -->
    <div class="bg-white rounded-xl border border-gray-200 p-6 mb-6">
      <div class="flex items-start justify-between">
        <div>
          <div class="flex items-center gap-2">
            <h4 class="text-lg font-bold text-gray-900">{{ growth.lead.name }}</h4>

          </div>
          <div class="flex flex-wrap gap-2 mt-2 text-sm text-gray-600">
            <span v-if="growth.lead.grade">{{ growth.lead.grade }}</span>
            <span v-if="growth.lead.country">· {{ growth.lead.country }}</span>
            <span v-if="growth.lead.phone">· {{ growth.lead.phone }}</span>
          </div>
        </div>
        <div class="text-right text-sm">
          <div class="text-gray-500">已上课 <strong class="text-indigo-600">{{ growth.total_schedules }}</strong> 节</div>
          <div class="text-gray-500">课后反馈 <strong class="text-green-600">{{ growth.total_feedbacks }}</strong> 份</div>
          <div class="text-gray-500">考试记录 <strong class="text-amber-600">{{ growth.total_exams }}</strong> 次</div>
        </div>
      </div>
      <!-- 课时进度条 -->
      <div v-if="growth.contracts && growth.contracts.length > 0" class="mt-4">
        <div v-for="c in growth.contracts" :key="c.id" class="mt-2">
          <div class="flex justify-between text-xs text-gray-500 mb-1">
            <span>{{ c.contract_no || '合同' }} ¥{{ (c.paid_amount || 0).toFixed(0) }} / ¥{{ (c.total_amount || 0).toFixed(0) }}</span>
            <span>{{ c.total_amount > 0 ? Math.round((c.paid_amount||0) / c.total_amount * 100) : 0 }}%</span>
          </div>
          <div class="w-full bg-gray-100 rounded-full h-1.5">
            <div class="bg-indigo-500 h-1.5 rounded-full" :style="{width: (c.total_amount > 0 ? Math.min(100, (c.paid_amount||0)/c.total_amount*100) : 0) + '%'}"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- ── 最近反馈 ── -->
    <div class="bg-white rounded-xl border border-gray-200 p-6 mb-6">
      <div class="flex items-center justify-between mb-4">
        <h5 class="font-semibold text-gray-900">
          <i class="bi bi-journal-text text-indigo-500 mr-2"></i>课后反馈
        </h5>
        <span class="text-xs text-gray-400">{{ growth.total_feedbacks }} 条</span>
      </div>
      <div v-if="growth.feedbacks.length === 0" class="text-center py-8 text-gray-400 text-sm">
        <i class="bi bi-inbox text-3xl block mb-2"></i>暂无课后反馈记录
      </div>
      <div v-else class="space-y-3">
        <div v-for="fb in growth.feedbacks.slice(0,5)" :key="fb.id" class="p-3 bg-gray-50 rounded-lg">
          <div class="flex items-center justify-between mb-1">
            <span class="text-xs font-medium text-indigo-600">{{ fb.subject || '未分类' }}</span>
            <span class="text-xs text-gray-400">{{ formatDate(fb.start_time) }}</span>
          </div>
          <p class="text-sm text-gray-700 line-clamp-2">{{ fb.content_covered }}</p>
          <div v-if="fb.difficulties" class="mt-1">
            <span class="text-xs text-amber-600">难点: {{ fb.difficulties }}</span>
          </div>
        </div>
      </div>
    </div>

    <!-- ── 排课列表 + 反馈入口 ── -->
    <div class="bg-white rounded-xl border border-gray-200 p-6 mb-6">
      <h5 class="font-semibold text-gray-900 mb-4">
        <i class="bi bi-calendar-week text-indigo-500 mr-2"></i>全部排课
      </h5>
      <div v-if="growth.schedules.length === 0" class="text-center py-8 text-gray-400 text-sm">
        <i class="bi bi-calendar-x text-3xl block mb-2"></i>暂无排课记录
      </div>
      <div v-else class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="border-b border-gray-100 text-gray-500 text-xs">
              <th class="text-left py-2 pr-4">日期</th>
              <th class="text-left py-2 pr-4">科目</th>
              <th class="text-left py-2 pr-4">教师</th>
              <th class="text-left py-2 pr-4">状态</th>
              <th class="text-left py-2 pr-4">反馈</th>
              <th class="text-left py-2" v-if="canManage">操作</th>
            </tr>
          </thead>
          <tbody>
            <tr v-for="s in growth.schedules" :key="s.id" class="border-b border-gray-50 hover:bg-gray-50">
              <td class="py-2.5 pr-4 whitespace-nowrap text-gray-700">{{ formatDate(s.start_time) }}</td>
              <td class="py-2.5 pr-4 text-gray-700">{{ s.subject || '-' }}</td>
              <td class="py-2.5 pr-4 text-gray-700">{{ s.teacher_name || '-' }}</td>
              <td class="py-2.5 pr-4">
                <span v-html="statusBadge(s.status)"></span>
              </td>
              <td class="py-2.5 pr-4">
                <span v-if="s.feedback_id" class="text-green-600 text-xs"><i class="bi bi-check-circle-fill mr-1"></i>已填写</span>
                <span v-else class="text-gray-400 text-xs">待填写</span>
              </td>
              <td class="py-2.5" v-if="canManage">

<script type="text/x-template" id="tpl-leads">
<div>
  <div class="flex items-center justify-between mb-4">
    <div>
      <h3 class="text-xl font-bold text-gray-900">资源管理</h3>
      <p class="text-sm text-gray-500 mt-0.5">所有线索资源，统一管理</p>
    </div>
    <button class="px-3 py-1.5 text-sm bg-indigo-600 text-white rounded-lg hover:bg-indigo-700" @click="openCreate">
      <i class="bi bi-plus-lg"></i> 新增线索
    </button>
  </div>
  <div class="bg-white rounded-xl border border-gray-200 mb-4">
    <div class="p-4 flex flex-wrap gap-3 items-center border-b border-gray-100">
      <input type="text" v-model="search" @input="debounceSearch" placeholder="搜索姓名/手机/微信..."
             class="px-3 py-1.5 border border-gray-300 rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-500 w-44">
      <select v-model="filters.status" @change="load" class="px-3 py-1.5 border border-gray-300 rounded-lg text-sm outline-none">
        <option value="all">全部状态</option>
        <option value="pending">待分配</option>
        <option value="assigned">已分配</option>
        <option value="following">跟进中</option>
        <option value="trial">试听中</option>
        <option value="enrolled">已签约</option>
        <option value="closed">已关闭</option>
        <option value="lost">已流失</option>
      </select>
      <select v-model="filters.source" @change="load" class="px-3 py-1.5 border border-gray-300 rounded-lg text-sm outline-none">
        <option value="all">全部来源</option>
        <option v-for="s in sourceOptions" :key="s.source" :value="s.source">{{ s.source }} ({{ s.cnt }})</option>
      </select>
      <select v-model="filters.rank" @change="load" class="px-3 py-1.5 border border-gray-300 rounded-lg text-sm outline-none">
        <option value="all">全部等级</option>
        <option value="A">A级</option>
        <option value="B">B级</option>
        <option value="C">C级</option>
      </select>
      <input type="date" v-model="filters.dateFrom" @change="onDateChange"
             class="px-3 py-1.5 border border-gray-300 rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-500 w-36"
             :max="filters.dateTo || undefined" title="开始日期">
      <input type="date" v-model="filters.dateTo" @change="onDateChange"
             class="px-3 py-1.5 border border-gray-300 rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-500 w-36"
             :min="filters.dateFrom || undefined" title="结束日期">
      <span class="text-xs text-gray-400 ml-auto">共 {{ total }} 条</span>
      <button class="px-2 py-1 text-xs border border-gray-300 rounded hover:bg-gray-100 ml-2" @click="downloadCSV">
        <i class="bi bi-download"></i> 导出CSV
      </button>
    </div>
    <div v-if="selectedIds.length > 0" class="px-4 py-2 bg-green-50 border-b border-green-100 flex items-center gap-3 text-sm">
      <span class="text-green-700">{{ selectedIds.length }} 条已选</span>
      <button class="px-2 py-1 bg-indigo-600 text-white rounded text-xs" @click="batchAssign">批量分配</button>
      <button class="px-2 py-1 bg-yellow-600 text-white rounded text-xs" @click="batchPool">回公海</button>
      <button class="px-2 py-1 text-xs border border-gray-300 rounded hover:bg-gray-100 ml-auto" @click="selectedIds = []">取消</button>
    </div>
    <div class="overflow-x-auto">
      <table class="w-full text-sm">
        <thead>
          <tr class="bg-gray-50 text-left">
            <th class="px-4 py-2.5 w-8"><input type="checkbox" :checked="selectedIds.length === list.length && list.length > 0" @change="toggleAll($event)"></th>
            <th class="px-4 py-2.5 w-10 text-gray-400 font-medium text-xs">#</th>
            <th class="px-4 py-2.5 w-14 text-gray-600 font-medium text-xs">等级</th>
            <th class="px-4 py-2.5 text-gray-600 font-medium">姓名</th>
            <th class="px-4 py-2.5 text-gray-600 font-medium">微信/手机</th>
            <th class="px-4 py-2.5 text-gray-600 font-medium">来源</th>
            <th class="px-4 py-2.5 text-gray-600 font-medium">意向</th>
            <th class="px-4 py-2.5 text-gray-600 font-medium">状态</th>
            <th class="px-4 py-2.5 text-gray-600 font-medium">跟进人</th>
            <th class="px-4 py-2.5 text-gray-600 font-medium">创建时间</th>
            <th class="px-4 py-2.5 w-12"></th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-100">
          <tr v-for="(l, idx) in list" :key="l.id" class="hover:opacity-80 cursor-pointer" :class="l.lead_rank === 'A' ? 'bg-pink-50 border-l-4 border-l-pink-500' : l.lead_rank === 'B' ? 'bg-red-50 border-l-4 border-l-red-500' : l.lead_rank === 'C' ? 'bg-blue-50 border-l-4 border-l-blue-500' : 'hover:bg-gray-50'" @click="openLead(l.id, $event)">
            <td class="px-4 py-2.5" @click.stop><input type="checkbox" :value="l.id" v-model="selectedIds"></td>
            <td class="px-4 py-2.5 text-gray-400 text-xs text-center">{{ total - ((page-1)*pageSize + idx) }}</td>
            <td class="px-4 py-2.5"><span v-if="l.lead_rank" class="inline-flex items-center justify-center w-5 h-5 rounded-full text-[.55rem] font-bold text-white leading-none" :class="l.lead_rank === 'A' ? 'bg-pink-500' : l.lead_rank === 'B' ? 'bg-red-500' : 'bg-blue-500'">{{ l.lead_rank }}</span></td>
            <td class="px-4 py-2.5 font-medium">{{ l.name }}</td>
            <td class="px-4 py-2.5 text-gray-500 text-xs">{{ l.wechat || l.phone || '-' }}</td>
            <td class="px-4 py-2.5">{{ l.source || '-' }}</td>
            <td class="px-4 py-2.5 text-xs text-gray-600">{{ [l.country, l.grade].filter(Boolean).join(' ') || '-' }}</td>
            <td class="px-4 py-2.5" v-html="statusBadge(l.status)"></td>
            <td class="px-4 py-2.5 text-xs text-gray-500">{{ l.assignee_name || '-' }}</td>
            <td class="px-4 py-2.5 text-xs text-gray-400">{{ (l.created_at || '').slice(0,10) }}</td>
            <td class="px-4 py-2.5" @click.stop>
              <button v-if="user?.role === 'admin' || user?.role === 'supervisor'" class="text-red-400 hover:text-red-600 text-sm" @click="confirmDeleteLead(l)" title="删除">
                <i class="bi bi-trash"></i>
              </button>
            </td>
          </tr>
          <tr v-if="list.length === 0"><td colspan="11" class="px-4 py-10 text-center text-sm text-gray-400">暂无数据</td></tr>
        </tbody>
      </table>
    </div>
    <div class="px-4 py-3 border-t border-gray-100 flex items-center justify-between">
      <span class="text-xs text-gray-500">第 {{ page }} / {{ totalPages }} 页</span>
      <div class="flex gap-1">
        <button class="pagination-btn" :class="{ 'opacity-30': page <= 1 }" :disabled="page <= 1" @click="goPage(page - 1)"><i class="bi bi-chevron-left text-xs"></i></button>
        <button v-for="p in pageNumbers" :key="p" class="pagination-btn" :class="{ active: p === page, 'opacity-30': p === '...' }" @click="goPage(p)" v-text="p"></button>
        <button class="pagination-btn" :class="{ 'opacity-30': page >= totalPages }" :disabled="page >= totalPages" @click="goPage(page + 1)"><i class="bi bi-chevron-right text-xs"></i></button>
      </div>
    </div>
  </div>

  <!-- Create Modal -->
  <div v-if="showCreate" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50 px-4" @click.self="showCreate = false">
    <div class="bg-white rounded-xl w-full max-w-md p-6 shadow-xl">
      <h5 class="font-semibold text-gray-900 mb-4">新增线索</h5>
      <div class="space-y-3">
        <div><label class="block text-xs text-gray-600 mb-1">姓名 *</label><input type="text" v-model="createForm.name" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-500" placeholder="学生姓名"></div>
        <div class="grid grid-cols-2 gap-3">
          <div><label class="block text-xs text-gray-600 mb-1">手机</label><input type="text" v-model="createForm.phone" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm outline-none" placeholder="手机号"></div>
          <div><label class="block text-xs text-gray-600 mb-1">微信</label><input type="text" v-model="createForm.wechat" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm outline-none" placeholder="微信号"></div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div><label class="block text-xs text-gray-600 mb-1">来源</label><select v-model="createForm.source" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm outline-none"><option v-for="s in sourceOptions" :key="s.source" :value="s.source">{{ s.source }}</option></select></div>
          <div><label class="block text-xs text-gray-600 mb-1">国家</label><input type="text" v-model="createForm.country" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm outline-none" placeholder="如: 英国"></div>
        </div>
        <div><label class="block text-xs text-gray-600 mb-1">年级</label><input type="text" v-model="createForm.grade" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm outline-none" placeholder="如: A-Level"></div>
        <div><label class="block text-xs text-gray-600 mb-1">备注</label><textarea v-model="createForm.remark" rows="2" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-500" placeholder="其他信息"></textarea></div>
      </div>
      <div class="flex justify-end gap-2 mt-5">
        <button class="px-4 py-2 text-sm border border-gray-300 rounded-lg hover:bg-gray-50" @click="showCreate = false">取消</button>
        <button class="px-4 py-2 text-sm bg-indigo-600 text-white rounded-lg hover:bg-indigo-700" @click="submitCreate" :disabled="creating">{{ creating ? '创建中...' : '创建' }}</button>
      </div>
    </div>
  </div>

  <!-- Assign Modal -->
  <div v-if="showAssign" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50 px-4" @click.self="showAssign = false">
    <div class="bg-white rounded-xl w-full max-w-xs p-6 shadow-xl">
      <h5 class="font-semibold text-gray-900 mb-4">批量分配</h5>
      <select v-model="assignTarget" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm outline-none mb-4">
        <option value="">选择跟进人...</option>
        <option v-for="u in users" :key="u.id" :value="u.id">{{ u.display_name }} ({{ roleLabel(u.role) }})</option>
      </select>
      <div class="flex justify-end gap-2">
        <button class="px-4 py-2 text-sm border border-gray-300 rounded-lg hover:bg-gray-50" @click="showAssign = false">取消</button>
        <button class="px-4 py-2 text-sm bg-indigo-600 text-white rounded-lg hover:bg-indigo-700" @click="submitAssign">分配</button>
      </div>
    </div>
  </div>

  <!-- 删除确认弹窗 -->
  <div v-if="deleteConfirm.show" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50 px-4" @click.self="deleteConfirm.show=false">
    <div class="bg-white rounded-xl w-full max-w-sm p-6 shadow-xl">
      <h5 class="font-semibold text-gray-900 mb-2">{{ deleteConfirm.title }}</h5>
      <p class="text-sm text-gray-600">{{ deleteConfirm.message }}</p>
      <div class="flex justify-end gap-2 mt-5">
        <button class="px-4 py-2 text-sm border border-gray-300 rounded-lg hover:bg-gray-50" @click="deleteConfirm.show=false">取消</button>
        <button class="px-4 py-2 text-sm bg-red-600 text-white rounded-lg hover:bg-red-700 disabled:opacity-50" @click="executeDelete" :disabled="deleteConfirm.loading">{{ deleteConfirm.loading ? '删除中...' : '删除' }}</button>
      </div>
    </div>
  </div>

    
</div>
</script>

<!-- Lead Detail -->
<script type="text/x-template" id="tpl-lead-detail">
<div>
  <div class="flex items-center justify-between mb-4">
    <button class="text-sm text-indigo-600 hover:underline" @click="goBack"><i class="bi bi-arrow-left"></i> 返回列表</button>
    <div class="flex items-center gap-2">
      <button class="text-xs px-3 py-1.5 border border-gray-200 rounded-lg text-gray-600 hover:bg-gray-50 disabled:opacity-30" :disabled="!hasPrevLead" @click="goPrevLead"><i class="bi bi-chevron-left"></i> 上一条</button>
      <button class="text-xs px-3 py-1.5 border border-gray-200 rounded-lg text-gray-600 hover:bg-gray-50 disabled:opacity-30" :disabled="!hasNextLead" @click="goNextLead">下一条 <i class="bi bi-chevron-right"></i></button>
    </div>
  </div>
  <div v-if="!lead" class="text-center py-10 text-gray-400">加载中...</div>
  <div v-else>
    <div class="bg-white rounded-xl border border-gray-200 p-6 mb-4">
      <div class="flex items-start justify-between mb-4">
        <div><h3 class="text-lg font-bold text-gray-900">{{ lead.name }}</h3><p class="text-xs text-gray-500 mt-0.5">创建于 {{ lead.created_at }}</p></div>
        <div class="flex items-center gap-2">
          <button v-if="canAssign" class="px-3 py-1.5 text-xs border border-gray-200 rounded-lg text-gray-600 hover:bg-indigo-50 hover:text-indigo-600 hover:border-indigo-200" @click="openDetailAssign"><i class="bi bi-person-plus mr-1"></i>分配</button>
          <button class="px-3 py-1.5 text-xs border border-gray-200 rounded-lg text-gray-600 hover:bg-indigo-50 hover:text-indigo-600 hover:border-indigo-200" @click="openLeadEdit(); showEditModal=true"><i class="bi bi-pencil mr-1"></i>编辑</button>
          <div v-html="statusBadge(lead.status)"></div>
        </div>
      </div>
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-sm">
        <div><span class="text-gray-500 text-xs">手机</span><p class="font-medium">{{ lead.phone || '-' }}</p></div>
        <div><span class="text-gray-500 text-xs">微信</span><p class="font-medium">{{ lead.wechat || '-' }}</p></div>
        <div><span class="text-gray-500 text-xs">来源</span><p class="font-medium">{{ lead.source || '-' }}</p></div>
        <div><span class="text-gray-500 text-xs">意向国家</span><p class="font-medium">{{ lead.country || '-' }}</p></div>
        <div><span class="text-gray-500 text-xs">年级</span><p class="font-medium">{{ lead.grade || '-' }}</p></div>
        <div><span class="text-gray-500 text-xs">跟进人</span><p class="font-medium">{{ lead.assignee_name || '未分配' }}</p></div>
        <div><span class="text-gray-500 text-xs">教务班主任</span><p class="font-medium">{{ lead.coordinator_name || '未分配' }}</p></div>
        <div><span class="text-gray-500 text-xs">最近跟进</span><p class="font-medium">{{ lead.last_followup_at ? lead.last_followup_at.slice(0,10) : '-' }}</p></div>
        <div><span class="text-gray-500 text-xs">下次跟进</span>
          <p class="font-medium flex items-center gap-1" v-if="lead.next_followup_at">
            <span class="inline-block w-2 h-2 rounded-full"
              :class="overdueDays > 0 ? 'bg-red-500' : (overdueDays < 0 && overdueDays > -1 ? 'bg-yellow-500' : 'bg-green-500')"></span>
            {{ lead.next_followup_at.slice(0,10) }}
            <span v-if="overdueDays > 3" class="text-xs text-red-600 font-semibold">(逾期{{ overdueDays }}天) 🔴</span>
            <span v-else-if="overdueDays > 0" class="text-xs text-orange-500">(逾期{{ overdueDays }}天) 🟡</span>
            <span v-else-if="overdueDays < 0 && overdueDays > -1" class="text-xs text-yellow-600">今日截止 🟡</span>
            <span v-else class="text-xs text-green-600">🟢</span>
          </p>
          <p v-else class="font-medium">-</p>
        </div>
      </div>

      <!-- 流失原因 -->
      <div v-if="lead.status === 'lost' && lead.lost_reason" class="mt-3 p-3 bg-red-50 border border-red-200 rounded-lg flex items-center gap-2">
        <i class="bi bi-exclamation-triangle-fill text-red-500"></i>
        <span class="text-sm text-red-700"><strong>流失原因：</strong>{{ lead.lost_reason }}</span>
      </div>

      <!-- 操作按钮 -->
      <div class="mt-4 pt-4 border-t border-gray-100 flex flex-wrap gap-2">
        <button v-if="lead.status !== 'lost' && canMarkLost"
                class="px-3 py-1.5 text-sm border border-red-300 text-red-700 rounded-lg hover:bg-red-50"
                @click="openLostModal">
          <i class="bi bi-x-circle"></i> 标记流失
        </button>
        <button v-if="lead.status === 'lost' && canRestore"
                class="px-3 py-1.5 text-sm border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50"
                @click="restoreFromLost">
          <i class="bi bi-arrow-counterclockwise"></i> 恢复跟进
        </button>
      </div>
      <div v-if="lead.remark" class="mt-4 pt-4 border-t border-gray-100 text-sm">
        <span class="text-gray-500 text-xs">备注</span>
        <p class="mt-1 text-gray-700 whitespace-pre-wrap">{{ lead.remark }}</p>
      </div>
    </div>

    <!-- 签约学生：合同 + 课时包 + 排课信息 -->
    <div v-if="lead.status === 'enrolled' && lead.contracts && lead.contracts.length > 0" class="space-y-4 mb-4">
      <div v-for="c in lead.contracts" :key="c.id" class="bg-white rounded-xl border border-gray-200">
        <div class="px-5 py-3 border-b border-gray-100 flex items-center justify-between">
          <h6 class="text-sm font-semibold text-gray-800">
            合同 {{ c.contract_no || '—' }}
            <span class="text-xs text-gray-400 ml-2">金额: ¥{{ (c.total_amount || 0).toLocaleString() }}</span>
          </h6>
          <div class="flex items-center gap-2">
            <span class="text-xs" :class="(c.paid_amount || 0) >= c.total_amount ? 'text-green-600' : 'text-amber-600'">
              已收 ¥{{ (c.paid_amount || 0).toLocaleString() }}
            </span>
            <span class="inline-block px-2 py-0.5 rounded text-[.65rem] font-medium"
              :class="c.status === 'active' ? 'bg-green-100 text-green-800' : c.status === 'completed' ? 'bg-blue-100 text-blue-800' : 'bg-gray-100 text-gray-600'">
              {{ c.status === 'active' ? '进行中' : c.status === 'completed' ? '已结清' : '已结束' }}
            </span>
            <button v-if="canManageContract" class="text-red-400 hover:text-red-600 ml-2" @click="confirmDeleteContract(c)" title="删除合同">
              <i class="bi bi-trash"></i>
            </button>
          </div>
        </div>
        <div class="px-5 py-3">
          <!-- 进度条 -->
          <div class="mb-4">
            <div class="flex items-center justify-between text-sm mb-1">
              <span class="text-gray-600 font-medium">课时进度</span>
              <span class="text-gray-500">
                <span class="font-bold" :class="c.remaining_hours <= 5 ? 'text-red-600' : 'text-gray-800'">{{ c.remaining_hours || 0 }}</span>
                <span class="text-gray-400">/{{ c.total_hours || 0 }}h 剩余</span>
              </span>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-4">
              <div class="h-4 rounded-full transition-all"
                   :class="c.remaining_hours <= 5 ? 'bg-red-500' : 'bg-indigo-500'"
                   :style="{ width: Math.min(100, (c.total_hours > 0 ? ((c.total_hours - (c.remaining_hours || 0)) / c.total_hours * 100) : 0)) + '%' }">
              </div>
            </div>
            <p class="text-xs text-gray-400 mt-1 text-right">
              已用 {{ c.used_hours || 0 }}h · {{ c.total_hours > 0 ? ((c.used_hours || 0) / c.total_hours * 100).toFixed(1) : 0 }}%
            </p>
          </div>
          <div class="grid grid-cols-3 gap-3 mb-3">
            <div class="bg-gray-50 rounded-lg p-3 text-center">
              <p class="text-xs text-gray-500 mb-0.5">总课时</p>
              <p class="text-base font-bold text-gray-800">{{ c.total_hours || 0 }}h</p>
            </div>
            <div class="bg-gray-50 rounded-lg p-3 text-center">
              <p class="text-xs text-gray-500 mb-0.5">已消耗</p>
              <p class="text-base font-bold text-gray-800">{{ c.used_hours || 0 }}h</p>
            </div>
            <div class="bg-gray-50 rounded-lg p-3 text-center">
              <p class="text-xs text-gray-500 mb-0.5">剩余</p>
              <p class="text-base font-bold" :class="c.remaining_hours <= 5 ? 'text-red-600' : 'text-gray-800'">{{ c.remaining_hours || 0 }}h</p>
            </div>
          </div>
          <div v-if="c.packages && c.packages.length > 0" class="divide-y divide-gray-50">
            <div v-for="p in c.packages" :key="p.id" class="py-2 flex items-center justify-between text-sm">
              <span class="text-gray-700">{{ p.name || '课时包' }}</span>
              <span class="text-gray-500">总 {{ p.total_hours }}h · 已用 {{ p.used_hours }}h · ¥{{ p.price_per_hour }}/h</span>
              <button v-if="canManageContract" class="text-red-400 hover:text-red-600 ml-2" @click="confirmDeletePackage(p)" title="删除课时包">
                <i class="bi bi-trash"></i>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 签约学生：排课记录 -->
    <div v-if="lead.status === 'enrolled' && lead.schedules && lead.schedules.length > 0" class="bg-white rounded-xl border border-gray-200 mb-4">
      <div class="px-5 py-3 border-b border-gray-100">
        <h6 class="text-sm font-semibold text-gray-800">课程记录</h6>
      </div>
      <div class="divide-y divide-gray-100 max-h-60 overflow-y-auto">
        <div v-for="sc in lead.schedules" :key="sc.id" class="px-5 py-3 flex items-center justify-between">
          <div class="flex items-center gap-3">
            <span class="text-xs text-gray-500">{{ sc.start_time?.slice(0,16) || '-' }}</span>
            <span class="text-sm text-gray-700">{{ sc.subject || '-' }}</span>
            <span v-if="sc.tutor_name" class="text-xs text-gray-400">{{ sc.tutor_name }}</span>
          </div>
          <div>
            <span class="inline-block px-2 py-0.5 rounded text-[.65rem] font-medium"
              :class="sc.status === 'completed' ? 'bg-green-100 text-green-800' : sc.status === 'pending' ? 'bg-yellow-100 text-yellow-800' : 'bg-gray-100 text-gray-600'">
              {{ sc.status === 'completed' ? '已完成' : sc.status === 'pending' ? '待上课' : sc.status === 'cancelled' ? '已取消' : sc.status }}
            </span>
          </div>
        </div>
      </div>
    </div>
    <div class="bg-white rounded-xl border border-gray-200">
      <div class="px-5 py-3 border-b border-gray-100"><h6 class="text-sm font-semibold text-gray-800">跟进记录</h6></div>
      <div class="p-5" v-if="canFollow">
        <textarea v-model="followContent" rows="2" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-500" placeholder="输入跟进内容..."></textarea>
        <div class="flex items-center gap-3 mt-2">
          <select v-model="followupType" class="px-2 py-1.5 border border-gray-300 rounded-lg text-xs outline-none">
            <option value="">跟进方式</option>
            <option v-for="opt in followupTypeOptions" :key="opt" :value="opt">{{ opt }}</option>
          </select>
          <select v-model="contactStatus" class="px-2 py-1.5 border border-gray-300 rounded-lg text-xs outline-none">
            <option value="">联系结果</option>
            <option value="added_wechat" class="text-green-600">✅ 已加微信</option>
            <option value="called" class="text-blue-600">📞 已通电话</option>
            <option value="not_reached" class="text-red-600">❌ 未接通</option>
            <option value="follow_up" class="text-amber-600">🔄 需跟进</option>
          </select>
          <select v-model="followupRank" required class="px-2 py-1.5 border border-gray-300 rounded-lg text-xs outline-none">
            <option value="">评级 *</option>
            <option value="A" class="text-pink-600 font-semibold">A 高意向/紧急</option>
            <option value="B" class="text-red-600 font-semibold">B 有意向</option>
            <option value="C" class="text-blue-600 font-semibold">C 潜在</option>
            <option value="D" class="text-gray-500 font-semibold">D 培育池</option>
          </select>
          <!-- A类展开：紧急程度 -->
          <select v-if="followupRank === 'A'" v-model="followupUrgencyLabel" class="px-2 py-1.5 border border-gray-300 rounded-lg text-xs outline-none">
            <option value="">紧急程度</option>
            <option value="挂科风险">📕 挂科风险</option>
            <option value="被警告">⚠️ 被警告</option>
            <option value="论文截止">📝 论文截止</option>
            <option value="考前提分">🎯 考前提分</option>
            <option value="其他">其他</option>
          </select>
          <!-- B类展开：距入学时间 -->
          <select v-if="followupRank === 'B'" v-model="followupEnrollmentTimeline" class="px-2 py-1.5 border border-gray-300 rounded-lg text-xs outline-none">
            <option value="">距入学时间</option>
            <option value="<1月">&lt; 1个月</option>
            <option value="1-3月">1-3个月</option>
            <option value=">3月">&gt; 3个月</option>
          </select>
          <!-- C类展开：选校阶段 -->
          <select v-if="followupRank === 'C'" v-model="followupApplicationStage" class="px-2 py-1.5 border border-gray-300 rounded-lg text-xs outline-none">
            <option value="">选校阶段</option>
            <option value="选校中">选校中</option>
            <option value="申请中">申请中</option>
            <option value="未定">未定</option>
          </select>
          <input type="text" v-model="nextAction" class="flex-1 px-3 py-1.5 border border-gray-300 rounded-lg text-sm outline-none" placeholder="下次行动">
          <input type="date" v-model="nextDate" class="px-3 py-1.5 border border-gray-300 rounded-lg text-sm outline-none">
          <button class="px-4 py-1.5 bg-indigo-600 text-white rounded-lg text-sm hover:bg-indigo-700" @click="submitFollow" :disabled="!followContent.trim() || !followupRank">提交</button>
        </div>
      </div>
      <div class="divide-y divide-gray-100 max-h-80 overflow-y-auto">
        <div v-for="f in lead.followups" :key="f.id" class="px-5 py-3">
          <div class="flex items-center gap-2 text-xs text-gray-400 mb-1">
            <span>{{ f.creator_name || '未知' }}</span>
            <span>{{ f.created_at }}</span>
            <span v-if="f.followup_type" class="inline-block px-1.5 py-0.5 bg-gray-100 text-gray-600 rounded text-[.6rem]">{{ f.followup_type }}</span>
          </div>
          <p class="text-sm text-gray-700 whitespace-pre-wrap">{{ f.content }}</p>
          <div v-if="f.next_action || f.next_date" class="mt-1 text-xs text-indigo-600">
            {{ f.next_action ? '下一步: ' + f.next_action : '' }}{{ f.next_date ? ' (截止: ' + f.next_date + ')' : '' }}
          </div>
          <button v-if="canManageContract" class="text-red-400 hover:text-red-600 mt-1 text-xs" @click="confirmDeleteFollowup(f)" title="删除跟进">
            <i class="bi bi-trash"></i>
          </button>
        </div>
        <div v-if="!lead.followups || lead.followups.length === 0" class="px-5 py-6 text-center text-sm text-gray-400">暂无跟进记录</div>
      </div>
    </div>

    <!-- 学业分析报告 -->
    <div class="bg-white rounded-xl border border-gray-200">
      <div class="px-5 py-3 border-b border-gray-100">
        <div class="flex items-center justify-between mb-2">
          <h6 class="text-sm font-semibold text-gray-800">
            <i class="bi bi-clipboard-data text-indigo-500 mr-1"></i>学业分析
          </h6>
        </div>
      </div>
      <!-- 统一报告列表 -->
      <div>
        <div class="px-3 py-2 border-b border-gray-50 flex justify-end">
          <button class="text-xs px-2.5 py-1.5 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700" @click="openConsultingCreate('unified')">
            <i class="bi bi-plus-lg"></i> 学业风险与规划报告
          </button>
        </div>
        <div v-if="!filteredConsultingReports('unified').length && !filteredConsultingReports('risk').length && !filteredConsultingReports('preparation').length" class="px-5 py-6 text-center text-sm text-gray-400">
          <i class="bi bi-inbox text-2xl block mb-1"></i>暂无学业报告
        </div>
        <div v-else class="divide-y divide-gray-100">
          <div v-for="r in filteredConsultingReports('unified').concat(filteredConsultingReports('risk'), filteredConsultingReports('preparation'))" :key="r.id" class="px-5 py-3 flex items-center justify-between hover:bg-gray-50">
            <div class="flex-1 min-w-0">

  <!-- List -->

  <div v-else class="space-y-3">
    <div v-for="t in list" :key="t.id" class="bg-white rounded-xl border border-gray-200 p-4 hover:shadow-sm transition">

        <!-- Info -->

            <span class="inline-block px-2 py-0.5 rounded text-[.6rem] font-medium"
              :class="{
                'bg-yellow-100 text-yellow-800': t.status === 'pending',
                'bg-green-100 text-green-800': t.status === 'completed',
                'bg-red-100 text-red-800': t.status === 'cancelled',
              }">{{ statusMap[t.status] || t.status }}</span>

          <div class="text-xs text-gray-500 mt-1 space-y-0.5">

            <div v-if="t.assignee_name"><i class="bi bi-person-check"></i> 顾问: {{ t.assignee_name }}</div>
          </div>
          <!-- Feedback section -->
          <div v-if="t.status === 'completed' && t.trial_feedback" class="mt-2 p-2 bg-gray-50 rounded-lg text-xs">
            <span class="text-gray-500">试听反馈: </span>
            <span class="text-gray-700">{{ t.trial_feedback }}</span>
            <span v-if="t.trial_followup_action" class="text-indigo-600 ml-2">下一步: {{ t.trial_followup_action }}</span>
          </div>
          <!-- Feedback form -->
          <div v-if="t.status === 'completed' && !t.trial_feedback && canFeedback" class="mt-2 border-t border-gray-100 pt-2">
            <textarea v-model="feedbackForm[t.id]" rows="2" placeholder="填写试听反馈..." class="w-full px-3 py-1.5 border border-gray-300 rounded text-xs outline-none focus:ring-1 focus:ring-indigo-500"></textarea>
            <div class="flex items-center gap-2 mt-1">
              <select v-model="feedbackAction[t.id]" class="px-2 py-1 border border-gray-300 rounded text-xs outline-none">

                <option value="enrolled">已签约</option>
                <option value="lost">已流失</option>
              </select>
              <select v-if="feedbackAction[t.id] === 'lost'" v-model="feedbackLostReason[t.id]" class="px-2 py-1 border border-gray-300 rounded text-xs outline-none">
                <option value="">选择流失原因...</option>
                <option>价格因素</option>
                <option>已选择其他机构</option>
                <option>时间安排冲突</option>
                <option>需求变更</option>
                <option>联系不上</option>
                <option>其他</option>

              <input type="text" v-model="feedbackNext[t.id]" placeholder="下次行动..." class="flex-1 px-2 py-1 border border-gray-300 rounded text-xs outline-none">

            </div>
          </div>
        </div>
        <!-- Actions -->
        <div class="shrink-0">
          <button v-if="canSchedule" class="px-2 py-1 text-xs border border-gray-300 rounded hover:bg-gray-100" @click="openEdit(t)">编辑</button>

      </div>

  </div>

  <!-- Create/Edit Modal -->

    <div class="bg-white rounded-xl w-full max-w-lg p-6 shadow-xl">
      <h5 class="font-semibold text-gray-900 mb-4">{{ editId ? '编辑试听' : '安排试听' }}</h5>
      <div class="space-y-3">
        <div>
          <label class="block text-xs text-gray-600 mb-1">学生 <span class="text-red-500">*</span></label>
          <searchable-select
            :items="leads"
            label-key="name"
            sub-label-key="phone"
            placeholder="搜索学生姓名或手机号..."
            v-model="form.lead_id">
          </searchable-select>
        </div>
        <div>
          <label class="block text-xs text-gray-600 mb-1">授课老师 <span class="text-red-500">*</span></label>
          <searchable-select
            :items="tutors"
            label-key="display_name"
            sub-label-key=""
            placeholder="搜索老师姓名..."
            v-model="form.tutor_id">
          </searchable-select>
        </div>
        <div>
          <label class="block text-xs text-gray-600 mb-1">科目</label>
          <input type="text" v-model="form.subject" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm outline-none" placeholder="如: 雅思写作试听">

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs text-gray-600 mb-1">开始时间 <span class="text-red-500">*</span></label>
            <input type="datetime-local" v-model="form.start_time" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm outline-none">

            <label class="block text-xs text-gray-600 mb-1">结束时间 <span class="text-red-500">*</span></label>
            <input type="datetime-local" v-model="form.end_time" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm outline-none">
          </div>
        </div>
        <div>
          <label class="block text-xs text-gray-600 mb-1">ClassIn 链接</label>
          <input type="url" v-model="form.classin_link" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm outline-none" placeholder="https://www.classin.com/...">
        </div>
        <div>
          <label class="block text-xs text-gray-600 mb-1">备注</label>
          <textarea v-model="form.remark" rows="2" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm outline-none"></textarea>
        </div>
      </div>
      <div class="flex justify-end gap-2 mt-5">
        <button class="px-4 py-2 text-sm border border-gray-300 rounded-lg hover:bg-gray-50" @click="closeModal">取消</button>

      </div>
    </div>
  </div>
</div>
</script>

<!-- Schedules -->
<script type="text/x-template" id="tpl-schedules">
<div>
  <div class="flex items-center justify-between mb-4">
    <div>
      <h3 class="text-xl font-bold text-gray-900">排课管理</h3>
      <p class="text-sm text-gray-500 mt-0.5">课程安排 · 教师分配 · 上课记录 · 课时看板</p>
    </div>
    <button class="px-3 py-1.5 text-sm bg-indigo-600 text-white rounded-lg hover:bg-indigo-700" @click="openCreate">
      <i class="bi bi-plus-lg"></i> 新增排课
    </button>
  </div>

  <!-- Filters -->
  <div class="bg-white rounded-xl border border-gray-200 mb-4">
    <div class="p-4 flex flex-wrap gap-3 items-center border-b border-gray-100">
      <input type="date" v-model="dateFrom" @change="load" class="px-3 py-1.5 border border-gray-300 rounded-lg text-sm outline-none">
      <span class="text-xs text-gray-400">至</span>
      <input type="date" v-model="dateTo" @change="load" class="px-3 py-1.5 border border-gray-300 rounded-lg text-sm outline-none">
      <input type="text" v-model="filterLeadName" @input="load" placeholder="搜索学生姓名..."
             class="px-3 py-1.5 border border-gray-300 rounded-lg text-sm outline-none w-36">
      <searchable-select
        :items="teachers"
        label-key="name"
        sub-label-key="level"
        placeholder="搜索教师..."
        v-model="filterTutor"
        @update:model-value="load">
      </searchable-select>
      <select v-model="filterStatus" @change="load" class="px-3 py-1.5 border border-gray-300 rounded-lg text-sm outline-none">
        <option value="">全部状态</option>
        <option value="pending">待上课</option>
        <option value="completed">已完成</option>
        <option value="cancelled">已取消</option>
      </select>
      <span class="text-xs text-gray-400 ml-auto">共 {{ total }} 条</span>
      <button v-if="selectedScheduleIds.length > 0" class="px-2 py-1 text-xs border border-red-300 text-red-600 rounded hover:bg-red-50" @click="confirmBatchDelete">
        <i class="bi bi-trash mr-1"></i>删除选中({{ selectedScheduleIds.length }})
      </button>
      <button class="px-2 py-1 text-xs border border-gray-300 rounded hover:bg-gray-100" @click="downloadCSV">
        <i class="bi bi-download"></i> 导出CSV
      </button>
    </div>
  </div>

  <!-- Schedule list grouped by date -->
  <div v-if="loading" class="text-center py-10 text-gray-400">加载中...</div>
  <div v-else-if="scheduleGroups.length === 0" class="bg-white rounded-xl border border-gray-200 p-10 text-center text-sm text-gray-400">暂无排课数据</div>
  <div v-else class="space-y-4">
    <div v-for="group in scheduleGroups" :key="group.date" class="bg-white rounded-xl border border-gray-200">
      <div class="px-5 py-3 border-b border-gray-100 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <input type="checkbox" @change="toggleAllGroups" :checked="allSelected" class="w-4 h-4 rounded border-gray-300 text-indigo-600">
          <h6 class="text-sm font-semibold text-gray-800">{{ group.dateLabel }}</h6>
        </div>
        <span class="text-xs text-gray-500">{{ group.items.length }} 节课</span>
      </div>
      <div class="divide-y divide-gray-100">
        <div v-for="s in group.items" :key="s.id" class="px-5 py-3 flex items-center gap-4 hover:bg-gray-50 cursor-pointer" @click="openDetail(s)">
          <input type="checkbox" :value="s.id" v-model="selectedScheduleIds" @click.stop class="w-4 h-4 rounded border-gray-300 text-indigo-600 flex-shrink-0">
          <!-- 时间段 -->
          <div class="text-center min-w-[90px]">
            <div class="text-xs font-bold text-gray-900">{{ timeLabel(s) }}</div>
            <div class="text-[.6rem] text-gray-400">{{ durationHint(s) }}</div>
          </div>
          <!-- 信息 -->
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2">
              <span class="font-medium text-sm">{{ s.lead_name || '-' }}</span>
              <span class="text-xs text-gray-400">{{ s.subject || '-' }}</span>
              <span v-if="s.tutoring_form" class="text-[.6rem] px-1.5 py-0.5 bg-purple-100 text-purple-700 rounded">{{ s.tutoring_form }}</span>
            </div>
            <div class="text-xs text-gray-500 mt-0.5">
              <i class="bi bi-person"></i> {{ s.teacher_name || s.tutor_name || '未分配' }}
              <span v-if="s.remark" class="ml-2 text-gray-400">· {{ s.remark }}</span>
            </div>
          </div>
          <!-- 剩余课时 -->
          <div @click.stop class="text-center min-w-[60px]">
            <span v-if="s.remaining_hours !== undefined && s.remaining_hours !== null"
                  class="text-[.6rem] px-1.5 py-0.5 rounded cursor-pointer"
                  :class="s.remaining_hours <= 5 ? 'bg-red-100 text-red-700' : 'bg-blue-100 text-blue-700'"
                  @click="showHoursPopup(s)">
              剩 {{ s.remaining_hours }}h
            </span>
          </div>
          <!-- 反馈状态（已结束/已完成课程可填写） -->
          <div @click.stop class="min-w-[56px] text-center">
            <template v-if="s.status === 'completed' || (s.status === 'pending' && new Date(s.end_time) <= new Date())">
              <button v-if="s.feedback_id"
                class="text-xs px-2 py-1 bg-green-50 text-green-700 rounded-md hover:bg-green-100 whitespace-nowrap"
                @click="openFeedback(s)">
                <i class="bi bi-check-circle-fill mr-0.5"></i>已填
              </button>
              <button v-else
                class="text-xs px-2 py-1 bg-indigo-50 text-indigo-600 rounded-md hover:bg-indigo-100 whitespace-nowrap"
                @click="openFeedback(s)">
                <i class="bi bi-journal-text mr-0.5"></i>反馈
              </button>
            </template>
            <span v-else class="text-xs text-gray-300">—</span>
          </div>
          <!-- 状态（自动识别已结束） -->
          <div>
            <span class="inline-block px-2 py-0.5 rounded text-[.65rem] font-medium"
              :class="{
                'bg-yellow-100 text-yellow-800': s.status === 'pending' && new Date(s.end_time) > new Date(),
                'bg-green-100 text-green-800': s.status === 'completed' || (s.status === 'pending' && new Date(s.end_time) <= new Date()),
                'bg-red-100 text-red-800': s.status === 'cancelled',
                'bg-blue-100 text-blue-800': s.status === 'in_progress'
              }">{{ s.status === 'pending' && new Date(s.end_time) <= new Date() ? '已完成' : statusMap[s.status] || s.status }}</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Hours popup -->
  <div v-if="hoursPopup" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50 px-4" @click.self="closeHoursPopup">
    <div class="bg-white rounded-xl w-full max-w-sm p-6 shadow-xl">
      <h5 class="font-semibold text-gray-900 mb-1">课时详情</h5>
      <p class="text-sm text-gray-500 mb-4">学生: <strong>{{ hoursPopup.lead_name }}</strong></p>
      <div class="space-y-3">
        <div class="bg-gray-50 rounded-lg p-4 text-center">
          <div class="grid grid-cols-3 gap-3">
            <div>
              <p class="text-xs text-gray-500">总课时</p>
              <p class="text-xl font-bold text-gray-900">{{ hoursPopup.total_hours || 0 }}h</p>
            </div>
            <div>
              <p class="text-xs text-gray-500">已消耗</p>
              <p class="text-xl font-bold text-amber-600">{{ hoursPopup.used_hours || 0 }}h</p>
            </div>
            <div>
              <p class="text-xs text-gray-500">剩余</p>
              <p class="text-xl font-bold" :class="hoursPopup.remaining_hours <= 5 ? 'text-red-600' : 'text-green-600'">{{ hoursPopup.remaining_hours || 0 }}h</p>
            </div>
          </div>
          <!-- 进度条 -->
          <div class="mt-3">
            <div class="w-full bg-gray-200 rounded-full h-3">
              <div class="bg-indigo-500 h-3 rounded-full transition-all" :style="{ width: Math.min(100, (hoursPopup.total_hours > 0 ? (hoursPopup.used_hours / hoursPopup.total_hours * 100) : 0)) + '%' }"></div>
            </div>
            <p class="text-xs text-gray-400 mt-1">{{ hoursPopup.total_hours > 0 ? (hoursPopup.used_hours / hoursPopup.total_hours * 100).toFixed(1) : 0 }}% 已消耗</p>
          </div>
        </div>
      </div>
      <div class="flex justify-end mt-4">
        <button class="px-4 py-2 text-sm border border-gray-300 rounded-lg hover:bg-gray-50" @click="closeHoursPopup">关闭</button>
      </div>
    </div>
  </div>

  <!-- Create/Edit Modal -->
  <div v-if="showModal" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50 px-4" @click.self="closeModal">
    <div class="bg-white rounded-xl w-full max-w-lg p-6 shadow-xl">

            label-key="name"
            sub-label-key="phone"
            placeholder="搜索学生姓名或手机号..."
            v-model="form.lead_id">
          </searchable-select>
        </div>
        <div>
          <label class="block text-xs text-gray-600 mb-1">教师</label>
          <searchable-select
            :items="teachers"
            label-key="name"
            placeholder="搜索老师姓名..."
            v-model="form.teacher_id">
          </searchable-select>
        </div>
        <div>
          <label class="block text-xs text-gray-600 mb-1">科目</label>
          <input type="text" v-model="form.subject" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm outline-none" placeholder="如: 雅思写作">
        </div>
        <div>
          <label class="block text-xs text-gray-600 mb-1">辅导形式</label>
          <input type="text" v-model="form.tutoring_form" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm outline-none" placeholder="如: 一对一、小组课（3人）">
        </div>
        <div class="grid grid-cols-2 gap-3">

        </div>

          <div v-if="form.repeat_enabled" class="flex items-center gap-2">

            <input type="number" v-model.number="form.repeat_count" min="1" max="52"
                   class="w-16 px-2 py-1 border border-gray-300 rounded text-sm text-center outline-none">
            <span class="text-xs text-gray-600">周（每周相同时间）</span>

          <label class="block text-xs text-gray-600 mb-1">实际上课时长（分钟）
            <span v-if="form.start_time && form.end_time" class="text-gray-400 font-normal">
              （计划: {{ form.start_time && form.end_time ? Math.round((new Date(form.end_time) - new Date(form.start_time)) / 60000) : '-' }}min）
            </span>
          </label>
          <input type="number" v-model.number="form.actual_duration_minutes" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm outline-none" placeholder="录入课后实际分钟数" min="0">

        <div>
          <label class="block text-xs text-gray-600 mb-1">ClassIn 链接</label>

        <div>
          <label class="block text-xs text-gray-600 mb-1">状态</label>
          <select v-model="form.status" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm outline-none">
            <option value="pending">待上课</option>
            <option value="completed">已完成</option>
            <option value="cancelled">已取消</option>
            <option value="in_progress">进行中</option>
          </select>
        </div>
        <div>
          <label class="block text-xs text-gray-600 mb-1">备注</label>
          <textarea v-model="form.remark" rows="2" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm outline-none"></textarea>

        <button class="px-4 py-2 text-sm border border-gray-300 rounded-lg hover:bg-gray-50" @click="closeModal">取消</button>

        <button class="px-4 py-2 text-sm bg-indigo-600 text-white rounded-lg hover:bg-indigo-700" @click="submitSave" :disabled="saving">{{ saving ? '保存中...' : '保存' }}</button>
      </div>
    </div>
  </div>

  <!-- ═══ 课后反馈弹窗 ═══ -->
  <div v-if="showFeedbackModal" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50 px-4" @click.self="showFeedbackModal=false">
    <div class="bg-white rounded-xl w-full max-w-2xl p-6 shadow-xl max-h-[90vh] overflow-y-auto">
      <h5 class="font-semibold text-gray-900 mb-4">
        <i class="bi bi-journal-text text-indigo-500 mr-2"></i>课后反馈 · {{ feedbackStudentName }}
      </h5>
      <div class="space-y-3">
        <div>
          <label class="block text-xs text-gray-500 mb-1">ClassIn 链接</label>
          <div class="flex gap-2">
            <input class="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500" v-model="feedbackForm.classin_link" placeholder="粘贴 ClassIn 回放链接...">
            <button class="px-3 py-2 text-sm rounded-lg whitespace-nowrap"

                    :disabled="aiGenerating" @click="generateFeedback">
              <i class="bi bi-robot mr-1"></i>{{ aiGenerating ? '生成中...' : 'AI 生成' }}
            </button>
          </div>
          <!-- 课时进度 -->
          <div v-if="feedbackPackageInfo && feedbackPackageInfo.total_hours" class="flex items-center gap-3 p-2.5 bg-gray-50 rounded-lg border border-gray-200 text-xs mt-2">

            <div class="flex-1 h-2 bg-gray-200 rounded-full overflow-hidden">
              <div class="h-full bg-indigo-500 rounded-full transition-all" :style="{width: (feedbackPackageInfo.total_hours > 0 ? (feedbackPackageInfo.used_hours / feedbackPackageInfo.total_hours * 100) : 0) + '%'}"></div>
            </div>
            <span class="text-gray-700 font-medium whitespace-nowrap">{{ feedbackPackageInfo.used_hours }}h / {{ feedbackPackageInfo.total_hours }}h</span>
            <span class="text-gray-400">剩 {{ feedbackPackageInfo.remaining_hours }}h</span>
          </div>
          <!-- AI 生成进度 -->
          <div v-if="aiGenerating" class="mt-4 cute-loader">
            <div class="flex items-start gap-3">
              <div class="character-box" :class="genStage.anim">
                <div class="char-face">{{ genStage.emoji }}</div>
                <div class="char-shadow"></div>
              </div>
              <div class="flex-1 min-w-0 pt-1">
                <div class="flex items-center gap-2 mb-1.5">
                  <span class="text-sm font-medium text-gray-800">{{ genStage.label }}</span>
                </div>
                <div class="progress-track">
                  <div class="progress-fill" :style="{width: genStatus.progress + '%'}">
                    <div class="progress-shine"></div>
                  </div>
                </div>
                <div class="flex justify-between mt-1">
                  <span class="text-xs text-gray-400 mr-2 break-all">{{ genStatus.step }}</span>
                  <span class="text-xs font-bold whitespace-nowrap"
                        :class="genStatus.progress >= 100 ? 'text-green-500' : 'text-indigo-500'">{{ genStatus.progress }}%</span>
                </div>
              </div>
            </div>
            <div v-if="genStatus.progress >= 100" class="confetti-container">
              <span class="confetti-piece" style="left:10%;animation-delay:0s">🌟</span>
              <span class="confetti-piece" style="left:30%;animation-delay:.15s">⭐</span>
              <span class="confetti-piece" style="left:50%;animation-delay:.3s">🎉</span>
              <span class="confetti-piece" style="left:70%;animation-delay:.45s">✨</span>
              <span class="confetti-piece" style="left:90%;animation-delay:.6s">🎊</span>
            </div>
          </div>
        </div>
        <div>
          <label class="block text-xs text-gray-500 mb-1">本节课教学内容 *</label>

        </div>
        <div>
          <label class="block text-xs text-gray-500 mb-1">课堂表现</label>
          <textarea class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500" rows="2" v-model="feedbackForm.student_performance" placeholder="学生课堂表现如何..."></textarea>
        </div>
        <div>
          <label class="block text-xs text-gray-500 mb-1">学习难点 / 吸收情况</label>
          <textarea class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500" rows="2" v-model="feedbackForm.difficulties" placeholder="学生哪些地方有困难..."></textarea>
        </div>
        <div>
          <label class="block text-xs text-gray-500 mb-1">作业完成情况</label>
          <textarea class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500" rows="2" v-model="feedbackForm.homework_completion" placeholder="作业完成情况..."></textarea>
        </div>
        <div>
          <label class="block text-xs text-gray-500 mb-1">综合评语（内参）</label>
          <textarea class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500" rows="3" v-model="feedbackForm.teacher_notes" placeholder="给学管/班主任的参考建议（内部使用）"></textarea>
          <p class="text-xs text-amber-600 mt-0.5"><i class="bi bi-info-circle"></i> 此字段为内部参考，学管决定是否放入家长反馈</p>
        </div>

        <!-- 内部参考分隔区 -->
        <div class="border-t border-dashed border-gray-200 pt-4 mt-3">
          <div class="flex items-center gap-2 mb-2">
            <span class="text-xs font-semibold text-amber-700 bg-amber-50 px-2 py-0.5 rounded">内部参考</span>
            <span class="text-xs text-gray-400">顾问/班主任决定是否同步家长</span>
          </div>
          <label class="block text-xs text-amber-700 mb-1">后续建议</label>
          <textarea class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500" rows="2" v-model="feedbackForm.next_focus" placeholder="后续教学建议，由顾问判断是否给家长..."></textarea>
        </div>
      </div>
      <div class="flex justify-end gap-2 mt-5">
        <button class="px-3 py-2 text-sm border border-indigo-200 text-indigo-600 rounded-lg hover:bg-indigo-50" @click="copyFeedback(false)">
          <i class="bi bi-clipboard mr-1"></i>复制家长版
        </button>
        <button class="px-3 py-2 text-sm border border-gray-300 rounded-lg hover:bg-gray-50" @click="copyFeedback(true)">
          <i class="bi bi-clipboard-data mr-1"></i>复制完整版
        </button>
        <button class="px-3 py-2 text-sm text-red-600 border border-red-200 rounded-lg hover:bg-red-50" @click="deleteFeedback($event)" v-if="feedbackScheduleId">
          <i class="bi bi-trash mr-1"></i>删除
        </button>
        <button class="px-4 py-2 text-sm border border-gray-300 rounded-lg hover:bg-gray-50" @click="closeFeedback">取消</button>
        <button class="px-4 py-2 text-sm bg-indigo-600 text-white rounded-lg hover:bg-indigo-700" @click="submitFeedback" :disabled="feedbackSaving">
          {{ feedbackSaving ? '保存中...' : '保存反馈' }}
        </button>
      </div>
    </div>
  </div>
</div>
</script>

<!-- Pool / 公海池 -->
<script type="text/x-template" id="tpl-pool">
<div>
  <div class="flex items-center justify-between mb-4">
    <div>
      <h3 class="text-xl font-bold text-gray-900">公海池</h3>
      <p class="text-sm text-gray-500 mt-0.5">未分配线索 · 可认领跟进</p>
    </div>
  </div>
  <div class="bg-white rounded-xl border border-gray-200">
    <div class="p-4 flex flex-wrap gap-3 items-center border-b border-gray-100">
      <input type="text" v-model="search" @input="debounceSearch" placeholder="搜索姓名/手机..."
             class="px-3 py-1.5 border border-gray-300 rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-500 w-44">
      <select v-model="filterSource" @change="load" class="px-3 py-1.5 border border-gray-300 rounded-lg text-sm outline-none">
        <option value="all">全部来源</option>
        <option v-for="s in sourceOptions" :key="s" :value="s">{{ s }}</option>
      </select>
      <span class="text-xs text-gray-400 ml-auto">共 {{ total }} 条</span>
    </div>
    <div class="overflow-x-auto">
      <table class="w-full text-sm">
        <thead>
          <tr class="bg-gray-50 text-left">
            <th class="px-4 py-2.5 text-gray-600 font-medium">姓名</th>
            <th class="px-4 py-2.5 text-gray-600 font-medium">微信/手机</th>
            <th class="px-4 py-2.5 text-gray-600 font-medium">来源</th>
            <th class="px-4 py-2.5 text-gray-600 font-medium">意向</th>
            <th class="px-4 py-2.5 text-gray-600 font-medium">创建时间</th>
            <th class="px-4 py-2.5 text-gray-600 font-medium">操作</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-100">
          <tr v-for="l in list" :key="l.id" class="hover:bg-gray-50">
            <td class="px-4 py-2.5 font-medium cursor-pointer" @click="openLead(l.id)">{{ l.name }}</td>
            <td class="px-4 py-2.5 text-xs text-gray-500">{{ l.wechat || l.phone || '-' }}</td>
            <td class="px-4 py-2.5">{{ l.source || '-' }}</td>
            <td class="px-4 py-2.5 text-xs text-gray-600">{{ [l.country, l.grade].filter(Boolean).join(' ') || '-' }}</td>
            <td class="px-4 py-2.5 text-xs text-gray-400">{{ (l.created_at || '').slice(0,10) }}</td>
            <td class="px-4 py-2.5">
              <button v-if="canClaim" class="px-2 py-1 text-xs bg-indigo-600 text-white rounded hover:bg-indigo-700" @click="claimLead(l.id)">认领</button>
              <button v-if="canAssign" class="px-2 py-1 text-xs border border-gray-300 rounded hover:bg-gray-100 ml-1" @click="showAssignLead(l)">分配</button>
            </td>
          </tr>
          <tr v-if="list.length === 0"><td colspan="6" class="px-4 py-10 text-center text-sm text-gray-400">公海池暂无数据</td></tr>
        </tbody>
      </table>
    </div>
    <div class="px-4 py-3 border-t border-gray-100 flex items-center justify-between">
      <span class="text-xs text-gray-500">第 {{ page }} / {{ totalPages }} 页</span>
      <div class="flex gap-1">
        <button class="pagination-btn" :class="{ 'opacity-30': page <= 1 }" :disabled="page <= 1" @click="goPage(page - 1)"><i class="bi bi-chevron-left text-xs"></i></button>
        <button v-for="p in pageNumbers" :key="p" class="pagination-btn" :class="{ active: p === page, 'opacity-30': p === '...' }" @click="goPage(p)" v-text="p"></button>
        <button class="pagination-btn" :class="{ 'opacity-30': page >= totalPages }" :disabled="page >= totalPages" @click="goPage(page + 1)"><i class="bi bi-chevron-right text-xs"></i></button>
      </div>
    </div>
  </div>

  <!-- Assign Modal -->
  <div v-if="showAssign" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50 px-4" @click.self="showAssign = false">
    <div class="bg-white rounded-xl w-full max-w-xs p-6 shadow-xl">
      <h5 class="font-semibold text-gray-900 mb-4">分配线索</h5>
      <p class="text-xs text-gray-500 mb-3">将 <strong>{{ assignLeadName }}</strong> 分配给：</p>
      <select v-model="assignTarget" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm outline-none mb-4">
        <option value="">选择跟进人...</option>
        <option v-for="u in assignUsers" :key="u.id" :value="u.id">{{ u.display_name }} ({{ roleLabel(u.role) }})</option>
      </select>
      <div class="flex justify-end gap-2">
        <button class="px-4 py-2 text-sm border border-gray-300 rounded-lg hover:bg-gray-50" @click="showAssign = false">取消</button>
        <button class="px-4 py-2 text-sm bg-indigo-600 text-white rounded-lg hover:bg-indigo-700" @click="submitAssign">确认分配</button>
      </div>
    </div>
  </div>
</div>
</script>

            <span class="text-xs text-gray-400 ml-2">{{ s.assignee_name || '无顾问' }}</span>
            <div class="text-xs text-gray-400">

    <div class="bg-white rounded-xl border border-gray-200">

        <h6 class="text-sm font-semibold text-gray-800">分配班主任</h6>
      </div>

        <p class="text-xs text-gray-500 mb-3" v-if="selectedEnrolledIds.length > 0">已选 <strong>{{ selectedEnrolledIds.length }}</strong> 名学生</p>

<!-- Packages / 课时包管理 -->
<script type="text/x-template" id="tpl-signing">
<div>
  <div class="flex items-center justify-between mb-4">
    <div>
      <h3 class="text-xl font-bold text-gray-900">签约管理</h3>
      <p class="text-sm text-gray-500 mt-0.5">收款记录 · 学生总览 · 一键签约</p>

    <button v-if="canManage" class="px-3 py-1.5 text-sm bg-indigo-600 text-white rounded-lg hover:bg-indigo-700" @click="openNewSigning">
      <i class="bi bi-plus-lg"></i> 新建签约
    </button>
    <button v-if="canManage" class="px-3 py-1.5 text-xs bg-white border border-gray-300 text-gray-600 rounded-lg hover:bg-gray-100" @click="refreshSignTypes" title="根据实际课时数据重新计算新签/续费">
      <i class="bi bi-arrow-repeat"></i> 重算类型
    </button>
  </div>

  <!-- Tab 切换 -->
  <div class="flex gap-1 mb-4">
    <button v-for="t in tabs" :key="t.key"
            class="px-4 py-2 text-sm rounded-lg transition"
            :class="tab === t.key ? 'bg-indigo-600 text-white' : 'bg-white border border-gray-200 text-gray-600 hover:bg-gray-50'"
            @click="tab = t.key">{{ t.label }}</button>
  </div>

  <!-- ═══ Tab 1: 收款记录 ═══ -->
  <div v-if="tab === 'records'">
    <!-- 本月统计 -->
    <div v-if="statsThisMonth.total > 0" class="mb-3 p-3 bg-indigo-50 rounded-xl border border-indigo-100 flex items-center gap-6 text-xs">
